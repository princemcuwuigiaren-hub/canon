<style>
/* ============================================================
   CANON — design tokens
   Amber  = your canon (writing, framework, chapters)
   Green  = the assistant's voice (Gemini)
   Rust   = flagged conflicts / continuity alerts
   ============================================================ */
:root{
  --bg:#FFFFFF;
  --surface:#F7F5F0;
  --surface-raised:#FFFFFF;
  --border:#E6E1D6;
  --border-soft:#EFEBE1;
  --text:#1B1712;
  --text-muted:#75695A;
  --text-faint:#A79C8A;

  --canon:#B8792A;
  --canon-soft:#F2E3C6;
  --canon-deep:#8F5D1E;

  --voice:#3C6B54;
  --voice-soft:#DEEAE2;
  --voice-deep:#274A39;

  --alert:#B24B3C;
  --alert-soft:#F5DDD7;
  --alert-deep:#8A362A;

  --shadow: 0 1px 2px rgba(27,23,18,0.04), 0 6px 20px rgba(27,23,18,0.06);
  --shadow-lg: 0 8px 30px rgba(27,23,18,0.12), 0 2px 8px rgba(27,23,18,0.08);
  --radius-s:10px;
  --radius-m:16px;
  --radius-l:22px;

  --font-display:'Fraunces', serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'JetBrains Mono', monospace;
}

html[data-theme="dark"]{
  --bg:#131009;
  --surface:#1C170F;
  --surface-raised:#221C13;
  --border:#332B1D;
  --border-soft:#2A2417;
  --text:#EDE6D6;
  --text-muted:#A79C8A;
  --text-faint:#6E6455;

  --canon:#DDA34C;
  --canon-soft:#3A2C15;
  --canon-deep:#F0C27E;

  --voice:#7FB89A;
  --voice-soft:#1E2C24;
  --voice-deep:#9ED0B4;

  --alert:#D97A67;
  --alert-soft:#33201B;
  --alert-deep:#EDA294;

  --shadow: 0 1px 2px rgba(0,0,0,0.2), 0 6px 20px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.3);
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%; overflow:hidden;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
  transition:background 0.25s ease, color 0.25s ease;
  -webkit-user-select:none; user-select:none;
}
button{font-family:inherit; cursor:pointer;}
input,textarea,select{font-family:inherit;}
input, textarea, .write-body, .msg.ai, .msg.user, .msg.system{
  -webkit-user-select:text; user-select:text;
}
::selection{background:var(--canon-soft); color:var(--canon-deep);}

.icon{width:20px; height:20px; display:inline-block; flex-shrink:0;}

.login-screen{
  min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; align-items:center;
  padding:12vh 24px 40px; text-align:center;
}
.login-icon-wrap{
  width:96px; height:96px; border-radius:24px; display:flex; align-items:center; justify-content:center;
  margin-bottom:20px; box-shadow:0 0 0 1px var(--border-soft), 0 12px 32px -8px var(--canon), var(--shadow-lg);
}
.login-icon{ width:100%; height:100%; border-radius:24px; display:block; }
.login-wordmark{ font-family:var(--font-display); font-weight:700; font-size:29px; color:var(--text); letter-spacing:0.01em; }
.login-tagline{ font-size:13px; color:var(--text-faint); margin-top:8px; max-width:260px; line-height:1.5; }
.login-actions{ width:100%; max-width:320px; margin-top:40px; display:flex; flex-direction:column; gap:12px; }
.login-actions .btn{ width:100%; padding:13px; font-size:14.5px; font-weight:600; }
.login-google-btn{
  background:var(--surface-raised); color:var(--text); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; gap:10px;
}
.login-divider{ display:flex; align-items:center; gap:12px; color:var(--text-faint); font-size:11px; font-family:var(--font-mono); letter-spacing:0.05em; margin:2px 0; }
.login-divider::before, .login-divider::after{ content:''; flex:1; height:1px; background:var(--border-soft); }
.login-skip{
  margin-top:28px; background:none; border:none; color:var(--text-muted);
  font-size:12.5px; text-decoration:underline; text-underline-offset:2px; line-height:1.6;
}
.login-skip span{ display:block; color:var(--text-faint); font-size:11px; text-decoration:none; margin-top:1px; }
.icon svg{width:100%; height:100%; display:block;}

#app{
  max-width:560px;
  margin:0 auto;
  height:100vh;
  height:100dvh;
  overflow:hidden;
  position:relative;
  background:var(--bg);
  display:flex;
  flex-direction:column;
}

.view{ display:none; flex-direction:column; flex:1; min-height:0; }
.view.active{ display:flex; }

/* ---------- Header ---------- */
.topbar{
  position:sticky; top:0; z-index:20;
  display:flex; align-items:center; gap:10px;
  padding:calc(env(safe-area-inset-top) + 14px) 18px 12px;
  background:var(--bg);
  border-bottom:1px solid var(--border-soft);
}
.topbar .tb-title{
  font-family:var(--font-display); font-weight:600; font-size:19px;
  flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.tb-btn{
  width:36px; height:36px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:transparent; border:none; color:var(--text);
  transition:transform 0.1s ease, background 0.15s ease;
}
.tb-btn:active{ background:var(--surface); transform:scale(0.90); }
.tb-btn.filled{ background:var(--canon); color:#fff; }

/* ---------- Home / bookshelf ---------- */
.shelf{
  display:grid; grid-template-columns:repeat(2,1fr); gap:16px;
  padding:18px 20px 100px;
}
.book-tile{
  display:flex; flex-direction:column; gap:8px;
  animation:riseIn 0.4s ease both;
  transition:transform 0.1s ease, opacity 0.1s ease;
}
.book-tile:active{ transform:scale(0.97); opacity:0.85; }
.book-cover{
  position:relative; aspect-ratio:2/3; border-radius:var(--radius-s);
  overflow:hidden; background:var(--surface); border:1px solid var(--border-soft);
  box-shadow:var(--shadow);
  display:flex; align-items:flex-end;
}
.book-cover img{ width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
.book-cover .fallback-label{
  position:relative; z-index:1; padding:14px; font-family:var(--font-display);
  font-weight:600; font-size:15px; color:#fff; line-height:1.25;
}
.book-cover .spine-shade{
  position:absolute; inset:0; background:linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.55) 100%);
}
.book-meta .b-title{
  font-family:var(--font-display); font-weight:600; font-size:14px; line-height:1.3;
  overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
}
.book-meta .b-sub{
  font-family:var(--font-mono); font-size:10.5px; color:var(--text-faint); margin-top:2px;
}
.book-meta .b-sub.tile-stats{ display:flex; flex-direction:column; gap:2px; }
.book-meta .b-sub.tile-stats .stat{ display:flex; align-items:center; gap:4px; }
.book-meta .b-sub.tile-stats .stat .icon{ width:11px; height:11px; }
.book-meta .b-sub.tile-stats .status-pill{ align-self:flex-start; margin-bottom:2px; }
.book-row-stats .status-pill{ margin-right:2px; }


@keyframes riseIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

.empty-state{
  margin:40px 20px; text-align:center; padding:36px 20px;
  border:1px dashed var(--border); border-radius:var(--radius-m); color:var(--text-muted);
}
.empty-state .icon{ width:30px; height:30px; margin:0 auto 10px; color:var(--text-faint); }
.empty-state h3{ font-family:var(--font-display); font-size:17px; margin:0 0 4px; color:var(--text); }
.empty-state p{ font-size:13px; margin:0; }

/* ---------- Bottom nav ---------- */
.bottom-nav{
  position:sticky; bottom:0; z-index:20;
  display:flex; background:var(--bg);
  border-top:1px solid var(--border-soft);
  padding:8px 6px calc(env(safe-area-inset-bottom) + 8px);
}
.nav-btn{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  background:none; border:none; color:var(--text-faint); padding:6px 2px; border-radius:12px;
  transition:transform 0.1s ease;
}
.nav-btn:active{ transform:scale(0.92); }
.nav-btn .icon{ width:21px; height:21px; }
.nav-btn span{ font-size:10px; font-weight:600; letter-spacing:0.01em; }
.nav-btn.active{ color:var(--canon); }

/* ---------- Cards / lists ---------- */
.section-pad{ padding:16px 18px 100px; flex:1; overflow-y:auto; }
.card{
  background:var(--surface-raised); border:1px solid var(--border-soft);
  border-radius:var(--radius-m); padding:14px 15px; margin-bottom:10px; box-shadow:var(--shadow);
  transition:transform 0.1s ease, opacity 0.1s ease;
}
.card[data-chapter]:active, .card[data-pick]:active, .card[data-pick-novel]:active{ transform:scale(0.98); opacity:0.85; }
.card-row{ display:flex; align-items:center; gap:12px; }
.achievement-row{ padding:10px 4px; border-bottom:1px solid var(--border-soft); }
.achievement-row:last-child{ border-bottom:none; }
.achievement-icon{
  width:34px; height:34px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  background:var(--surface); color:var(--text-faint);
}
.achievement-row.done .achievement-icon{ background:var(--canon-soft); color:var(--canon-deep); }
.achievement-row.locked{ opacity:0.55; }
.achievement-row.locked .card-title, .achievement-row.locked .card-sub{ color:var(--text-faint); }
.card-title{ font-family:var(--font-display); font-weight:600; font-size:15.5px; }
.card-sub{ font-size:12.5px; color:var(--text-muted); margin-top:2px; }
.pill{
  display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:99px;
  font-size:10.5px; font-weight:600; font-family:var(--font-mono); letter-spacing:0.02em;
}
.pill.canon{ background:var(--canon-soft); color:var(--canon-deep); }
.pill.voice{ background:var(--voice-soft); color:var(--voice-deep); }
.pill.alert{ background:var(--alert-soft); color:var(--alert-deep); }
.pill.neutral{ background:var(--surface); color:var(--text-muted); border:1px solid var(--border-soft); }

.chip-row{ display:flex; gap:8px; overflow-x:auto; padding:2px 18px 14px; scrollbar-width:none; }
.chip-row::-webkit-scrollbar{ display:none; }
.chip{
  flex-shrink:0; padding:8px 14px; border-radius:99px; font-size:12.5px; font-weight:600;
  background:var(--surface); border:1px solid var(--border-soft); color:var(--text-muted);
  display:flex; align-items:center; gap:6px; white-space:nowrap;
  transition:transform 0.1s ease;
}
.chip:active{ transform:scale(0.94); }
.chip.active{ background:var(--text); color:var(--bg); border-color:var(--text); }
.chip:disabled{ opacity:0.45; pointer-events:none; }
.fw-gallery{ display:grid; grid-template-columns:repeat(2,1fr); gap:14px; padding:4px 0 16px; }
.fw-gallery-card{
  position:relative; border-radius:16px; overflow:hidden; aspect-ratio:3/4;
  box-shadow:0 10px 22px -8px rgba(0,0,0,.4), 0 2px 6px rgba(0,0,0,.14);
  transition:transform 0.12s ease; cursor:pointer;
}
.fw-gallery-card:active{ transform:scale(0.95); }
.fw-gallery-card img{ width:100%; height:100%; object-fit:cover; display:block; }
.fw-gallery-fallback{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
.fw-gallery-name{
  position:absolute; left:0; right:0; bottom:0; padding:12px 10px 10px;
  background:linear-gradient(transparent, rgba(0,0,0,.78));
  color:#fff; font-family:var(--font-display); font-weight:700; font-size:13.5px; line-height:1.25;
}

.fab{
  position:fixed; z-index:30; bottom:calc(env(safe-area-inset-bottom) + 84px); right:calc(50% - 260px + 20px);
  width:44px; height:44px; border-radius:50%; background:var(--canon); color:#fff; border:none;
  display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-lg);
  transition:transform 0.1s ease;
}
.fab:active{ transform:scale(0.90); }
@media (max-width:600px){ .fab{ right:18px; } }
.fab .icon{ width:19px; height:19px; }

/* ---------- Home: list rows (default) ---------- */
.shelf-list{ padding:6px 14px 90px; }
.book-row{
  display:flex; align-items:center; gap:12px; padding:11px 4px;
  border-bottom:1px solid var(--border-soft);
  transition:transform 0.1s ease, opacity 0.1s ease;
}
.book-row:active{ transform:scale(0.98); opacity:0.8; }
.book-row-thumb{
  width:46px; height:46px; border-radius:9px; overflow:hidden; flex-shrink:0;
  background:var(--surface); border:1px solid var(--border-soft);
  display:flex; align-items:center; justify-content:center; color:var(--text-faint);
}
.book-row-thumb img{ width:100%; height:100%; object-fit:cover; object-position:center top; }
.book-row-info{ flex:1; min-width:0; }
.book-row-info .b-title{ font-family:var(--font-display); font-weight:600; font-size:14.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.book-row-stats{ display:flex; align-items:center; gap:12px; margin-top:3px; font-family:var(--font-mono); font-size:11px; color:var(--text-faint); }
.book-row-stats .stat{ display:flex; align-items:center; gap:4px; }
.book-row-stats .stat .icon{ width:12px; height:12px; }

.home-topline{ display:flex; align-items:center; justify-content:flex-end; gap:6px; padding:10px 14px 0; }

.empty-mid{
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:10px; padding:20px; text-align:center;
}
.empty-mid .icon{ width:26px; height:26px; color:var(--text-faint); }
.empty-mid h3{ font-family:var(--font-display); font-size:16px; margin:0; color:var(--text); font-weight:600; }

.home-credit{
  text-align:center; padding:18px 0 8px;
  font-family:var(--font-display); font-style:italic; font-weight:500;
  font-size:16px; letter-spacing:0.01em; color:var(--canon);
}
.home-credit::before{ content:"— "; opacity:0.6; }

/* ---------- Editor toolbar ---------- */
.editor-toolbar-row{
  display:flex; align-items:center; gap:4px; padding:6px 14px; border-bottom:1px solid var(--border-soft);
}
.et-btn{
  width:32px; height:32px; border-radius:9px; border:none; background:none; color:var(--text-muted);
  display:flex; align-items:center; justify-content:center;
  transition:transform 0.1s ease, background 0.15s ease;
}
.et-btn:active{ background:var(--surface); transform:scale(0.90); }
.et-btn.text-btn{ font-family:var(--font-mono); font-weight:700; font-size:13px; }
.et-btn.text-btn{ flex-direction:column; gap:0; }
.et-btn.text-btn .fs-tag{ font-size:8px; font-weight:700; color:var(--canon); font-family:var(--font-mono); letter-spacing:0.02em; margin-top:-1px; }
.editor-toolbar-row .spacer{ flex:1; }

/* ---------- Forms / modals ---------- */
.sheet-backdrop{
  position:fixed; inset:0; background:rgba(20,17,10,0.45); z-index:50;
  display:none; align-items:flex-end; justify-content:center;
}
.sheet-backdrop.active{ display:flex; }
.sheet{
  width:100%; max-width:560px; background:var(--bg); border-radius:22px 22px 0 0;
  max-height:88vh; overflow-y:auto; padding:18px 20px calc(env(safe-area-inset-bottom) + 24px);
  animation:sheetUp 0.25s cubic-bezier(.2,.8,.3,1) both; box-shadow:var(--shadow-lg);
}
@keyframes sheetUp{ from{ transform:translateY(24px); opacity:0.6; } to{ transform:translateY(0); opacity:1; } }
.sheet-handle{ width:38px; height:4px; border-radius:99px; background:var(--border); margin:0 auto 14px; }
.sheet h2{ font-family:var(--font-display); font-size:20px; margin:0 0 14px; font-weight:600; }

.field{ margin-bottom:14px; }
.fw-section{ margin-bottom:18px; padding-top:14px; border-top:1px solid var(--border-soft); }
.fw-section:first-child{ padding-top:0; border-top:none; }
.fw-section-label{ font-family:var(--font-display); font-weight:700; font-size:13px; color:var(--canon); margin-bottom:10px; }
.field label{ display:block; font-size:12px; font-weight:600; color:var(--text-muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.03em; }
.field input[type=text], .field input[type=password], .field input[type=email], .field textarea, .field select{
  width:100%; padding:11px 13px; border-radius:12px; border:1px solid var(--border);
  background:var(--surface); color:var(--text); font-size:14.5px; resize:vertical;
}
.field input:focus, .field textarea:focus, .field select:focus{
  outline:2px solid var(--canon); outline-offset:1px; background:var(--surface-raised);
}
.field-hint{ font-size:11.5px; color:var(--text-faint); margin-top:5px; }
.field-hint.warn{ color:var(--alert-deep); font-weight:600; }
.field-cover-upload{
  display:flex; align-items:center; gap:12px; padding:10px; border:1px dashed var(--border);
  border-radius:12px; background:var(--surface);
}
.field-cover-upload .thumb{ width:52px; height:76px; border-radius:6px; object-fit:cover; background:var(--border-soft); flex-shrink:0; }
.btn{
  width:100%; padding:13px; border-radius:12px; border:none; font-weight:600; font-size:14.5px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:transform 0.1s ease, opacity 0.1s ease;
}
.btn:active{ transform:scale(0.97); opacity:0.88; }
.btn.primary{ background:var(--canon); color:#fff; }
.btn.ghost{ background:var(--surface); color:var(--text); border:1px solid var(--border); }
.btn.voice-btn{ background:var(--voice); color:#fff; }
.btn.danger{ background:var(--alert-soft); color:var(--alert-deep); }
.btn.small{ width:auto; padding:8px 14px; font-size:13px; }
.btn-row{ display:flex; gap:10px; }
.btn-row .btn{ flex:1; }

/* ---------- Write tab ---------- */
.write-toolbar{
  display:flex; align-items:center; gap:8px; padding:10px 16px; border-bottom:1px solid var(--border-soft);
  font-family:var(--font-mono); font-size:11.5px; color:var(--text-faint);
}
.write-toolbar .save-dot{ width:7px; height:7px; border-radius:50%; background:var(--border); transition:background 0.2s; }
.write-toolbar .save-dot.saved{ background:var(--voice); }
.write-title-input{
  width:100%; border:none; background:none; font-family:var(--font-display); font-weight:600;
  font-size:22px; padding:18px 20px 6px; color:var(--text);
}
.write-title-input:focus{ outline:none; }
.write-beat-input{
  width:100%; border:none; background:none; font-family:var(--font-mono); font-style:italic;
  font-size:12.5px; padding:0 20px 10px; color:var(--text-faint);
}
.write-beat-input:focus{ outline:none; color:var(--text-muted); }
.write-body{
  flex:1; border:none; background:none; resize:none; width:100%;
  padding:6px 20px 40px; font-size:16px; line-height:1.75; color:var(--text); font-family:var(--font-body);
}
.write-body:focus{ outline:none; }
#writeView.focus-mode #writeTopbar,
#writeView.focus-mode #writeToolbarRow,
#writeView.focus-mode #writeStatusBar{ display:none !important; }
#writeView.focus-mode #btnExitFocus{ display:flex !important; }
#writeView.focus-mode .write-title-input{ padding-top:calc(env(safe-area-inset-top) + 20px); }

/* ---------- Framework cards ---------- */
.fw-card .fw-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
.fw-field-line{ display:flex; gap:8px; font-size:12.5px; margin-top:6px; }
.fw-field-line b{ color:var(--text-muted); font-weight:600; flex-shrink:0; }
.fw-field-line span{ color:var(--text); }
.rel-link{ color:var(--canon); font-weight:600; text-decoration:underline; text-decoration-color:var(--canon-soft); cursor:pointer; }

/* ---------- Assistant ---------- */
.chat-scroll{ flex:1; overflow-y:auto; padding:14px 16px 12px; display:flex; flex-direction:column; gap:10px; }
.msg{ max-width:86%; padding:11px 14px; border-radius:16px; font-size:14px; line-height:1.5; }
.msg.user{ align-self:flex-end; background:var(--canon); color:#fff; border-bottom-right-radius:5px; }
.msg.ai{ align-self:flex-start; background:var(--voice-soft); color:var(--voice-deep); border-bottom-left-radius:5px; }
.msg.ai strong{ font-weight:700; }
.msg.ai em{ font-style:italic; }
.msg.ai code{ font-family:var(--font-mono); background:rgba(0,0,0,0.08); padding:1px 5px; border-radius:4px; font-size:0.92em; }
.msg.system{ align-self:center; background:var(--surface); color:var(--text-faint); font-size:12px; font-family:var(--font-mono); border-radius:10px; }
.msg-wrap{ display:inline-flex; flex-direction:column; max-width:86%; }
.msg-wrap.user{ align-self:flex-end; align-items:flex-end; }
.msg-wrap.ai{ align-self:flex-start; align-items:flex-start; }
.msg-wrap .msg{ max-width:100%; }
.msg-actions{ display:flex; gap:14px; margin-top:4px; padding:0 4px; }
.msg-act{ background:none; border:none; padding:2px; cursor:pointer; color:var(--text-faint); opacity:0.55; display:flex; align-items:center; }
.msg-act:active{ opacity:1; transform:scale(0.92); }
.chat-input-row{
  display:flex; gap:8px; padding:10px 14px calc(env(safe-area-inset-bottom) + 10px); border-top:1px solid var(--border-soft);
}
.chat-input-row textarea{
  flex:1; border:1px solid var(--border); border-radius:16px; padding:10px 14px; font-size:14px;
  resize:none; max-height:100px; background:var(--surface); color:var(--text);
}
.chat-send{
  width:42px; height:42px; border-radius:50%; background:var(--canon); color:#fff; border:none;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.chat-send:disabled{ opacity:0.4; }

.thread-bar{
  display:flex; align-items:center; gap:6px; padding:9px 16px; border-bottom:1px solid var(--border-soft);
  flex-shrink:0; cursor:pointer; color:var(--text-muted);
}
.thread-bar-title{ display:flex; align-items:center; gap:6px; font-weight:600; font-size:13px; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0; }
.thread-bar-count{ font-size:11px; color:var(--text-faint); font-family:var(--font-mono); }
.thread-row{ padding:10px 4px; border-bottom:1px solid var(--border-soft); }
.thread-row:last-child{ border-bottom:none; }
.thread-row.active .card-title{ color:var(--canon-deep); }

.assist-actions{ display:flex; gap:8px; padding:10px 16px; overflow-x:auto; scrollbar-width:none; border-top:1px solid var(--border-soft); flex-shrink:0; }
.assist-actions::-webkit-scrollbar{ display:none; }
.assist-actions .chip{ background:var(--voice-soft); color:var(--voice-deep); border-color:transparent; }

.chat-scroll-wrap{ position:relative; flex:1; min-height:0; display:flex; flex-direction:column; }
.scroll-bottom-btn{
  position:absolute; bottom:12px; right:16px; width:36px; height:36px; border-radius:50%;
  background:var(--surface-raised); border:1px solid var(--border-soft); box-shadow:var(--shadow);
  display:flex; align-items:center; justify-content:center; color:var(--text);
  opacity:0; pointer-events:none; transition:opacity 0.15s ease, transform 0.1s ease;
}
.scroll-bottom-btn.show{ opacity:1; pointer-events:auto; }
.scroll-bottom-btn:active{ transform:scale(0.90); }

.msg-expand-toggle{ display:none; }
.card-expand-toggle{ display:none; }
.card-content-clamped{ max-height:110px; overflow:hidden; position:relative; }
.card-content-clamped::after{ content:''; position:absolute; bottom:0; left:0; right:0; height:30px; background:linear-gradient(transparent, var(--surface-raised)); }
.card-expand-toggle:checked ~ .card-content-clamped{ max-height:none; }
.card-expand-toggle:checked ~ .card-content-clamped::after{ display:none; }
.card-more-link{ display:block; margin-top:8px; font-size:12px; font-weight:700; cursor:pointer; text-decoration:underline; opacity:0.85; color:var(--canon); }
.card-expand-toggle:checked ~ .card-more-link.more{ display:none; }
.card-more-link.less{ display:none; }
.card-expand-toggle:checked ~ .card-more-link.less{ display:block; }
.msg-content-clamped{ max-height:170px; overflow:hidden; position:relative; }
.msg.user .msg-content-clamped::after{ content:''; position:absolute; bottom:0; left:0; right:0; height:34px; background:linear-gradient(transparent, var(--canon)); }
.msg.ai .msg-content-clamped::after{ content:''; position:absolute; bottom:0; left:0; right:0; height:34px; background:linear-gradient(transparent, var(--voice-soft)); }
.msg-expand-toggle:checked ~ .msg-content-clamped{ max-height:none; }
.msg-expand-toggle:checked ~ .msg-content-clamped::after{ display:none; }
.msg-more-link{ display:block; margin-top:6px; font-size:12px; font-weight:700; cursor:pointer; text-decoration:underline; opacity:0.85; }
.msg-expand-toggle:checked ~ .msg-more-link.more{ display:none; }
.msg-more-link.less{ display:none; }
.msg-expand-toggle:checked ~ .msg-more-link.less{ display:block; }


/* ---------- Continuity check results (signature element) ---------- */
.cc-result{ border-radius:var(--radius-m); border:1px solid var(--border-soft); margin-bottom:12px; overflow:hidden; background:var(--surface-raised); box-shadow:var(--shadow); }
.cc-result .cc-tag{
  display:flex; align-items:center; gap:8px; padding:10px 14px; font-size:11.5px; font-weight:700;
  font-family:var(--font-mono); text-transform:uppercase; letter-spacing:0.04em;
}
.cc-result.conflict .cc-tag{ background:var(--alert-soft); color:var(--alert-deep); }
.cc-result.new .cc-tag{ background:var(--canon-soft); color:var(--canon-deep); }
.cc-result.thread .cc-tag{ background:var(--canon-soft); color:var(--canon-deep); }
.cc-result.stale .cc-tag{ background:var(--voice-soft); color:var(--voice-deep); }
.cc-result.question .cc-tag{ background:var(--voice-soft); color:var(--voice-deep); }
.cc-body{ padding:13px 14px 15px; }
.cc-compare{ display:flex; flex-direction:column; gap:8px; margin-top:6px; }
.cc-compare .cc-line{ display:flex; gap:8px; font-size:13px; line-height:1.5; }
.cc-compare .cc-line .cc-src{ font-family:var(--font-mono); font-size:10px; color:var(--text-faint); flex-shrink:0; width:64px; padding-top:2px; text-transform:uppercase; letter-spacing:0.03em; }
.cc-actions{ display:flex; gap:8px; margin-top:12px; }
.cc-actions .btn{ padding:9px; font-size:12.5px; }

/* ---------- Settings ---------- */
.settings-group{ margin-bottom:22px; }
.settings-group h4{ font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-faint); margin:0 0 10px; padding:0 2px; }
.achievements-group summary{
  display:flex; align-items:center; justify-content:space-between; cursor:pointer;
  list-style:none; padding:0 2px;
}
.achievements-group summary::-webkit-details-marker{ display:none; }
.achievements-group summary .details-chevron{ color:var(--text-faint); transition:transform 0.2s ease; display:flex; }
.achievements-group[open] summary .details-chevron{ transform:rotate(180deg); }
.seg-control{ display:flex; background:var(--surface); border-radius:12px; padding:3px; border:1px solid var(--border-soft); }
.seg-control button{ flex:1; padding:9px; border:none; background:none; border-radius:9px; font-size:13px; font-weight:600; color:var(--text-muted); display:flex; align-items:center; justify-content:center; gap:6px; }
.seg-control button.active{ background:var(--surface-raised); color:var(--text); box-shadow:var(--shadow); }
.seg-control.compact button{ padding:8px 4px; font-size:11.5px; }
.about-block{ text-align:center; padding:20px 0 4px; color:var(--text-faint); font-size:12px; }
.about-block .app-mark{ width:44px; height:44px; margin:0 auto 10px; border-radius:12px; overflow:hidden; }
.about-block .app-mark img{ width:100%; height:100%; }
.about-block b{ color:var(--text); font-family:var(--font-display); font-size:15px; display:block; margin-bottom:2px; }

.toast{
  position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(10px); z-index:100;
  background:var(--text); color:var(--bg); padding:10px 18px; border-radius:99px; font-size:13px;
  opacity:0; transition:all 0.25s ease; pointer-events:none; white-space:nowrap; box-shadow:var(--shadow-lg);
}
.toast.long{ white-space:normal; border-radius:16px; max-width:min(320px, 86vw); text-align:center; line-height:1.4; }
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

.celebrate-overlay{
  position:fixed; inset:0; z-index:999; display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,0); pointer-events:none; transition:background 0.3s ease;
}
.celebrate-overlay.show{ background:rgba(0,0,0,0.35); pointer-events:auto; }
.celebrate-card{
  position:relative; background:var(--surface-raised); border-radius:20px; padding:28px 32px;
  text-align:center; max-width:270px; box-shadow:var(--shadow-lg); overflow:hidden;

const wordCount = (s) => {

    .replace(/\*\*\*|\*\*|\*|~~/g, '') // bold/italic/strikethrough markers
    .replace(/^\s*\*\s*\*\s*\*\s*$/gm, '') // scene break line
    .trim();

};
const debounce = (fn, ms) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };

const relDate = (ts) => { if(!ts) return ''; const diff = Date.now()-ts; const day=86400000; if(diff<3600000) return 'just now'; if(diff<day) return Math.floor(diff/3600000)+'h ago'; if(diff<day*30) return Math.floor(diff/day)+'d ago'; return fmtDate(ts); };

/* ---------- IndexedDB layer ---------- */
const DB_NAME = 'canon_db', DB_VERSION = 4;
let _db = null;
function openDB(){
  if(_db) return Promise.resolve(_db);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      const tx = e.target.transaction;
      if(!db.objectStoreNames.contains('novels')) db.createObjectStore('novels', {keyPath:'id'});
      if(!db.objectStoreNames.contains('chapters')){
        const s = db.createObjectStore('chapters', {keyPath:'id'});
        s.createIndex('novelId','novelId');
      }
      if(!db.objectStoreNames.contains('framework')){
        const s = db.createObjectStore('framework', {keyPath:'id'});
        s.createIndex('novelId','novelId');
      }
      if(!db.objectStoreNames.contains('chatlogs')){
        const s = db.createObjectStore('chatlogs', {keyPath:'id'});
        s.createIndex('novelId','novelId');
        s.createIndex('threadId','threadId');
      }else{
        // upgrading from the single-thread schema — add the threadId index
        const s = tx.objectStore('chatlogs');
        if(!s.indexNames.contains('threadId')) s.createIndex('threadId','threadId');
      }
      if(!db.objectStoreNames.contains('platforms')){
        db.createObjectStore('platforms', {keyPath:'id'});
      }
      if(!db.objectStoreNames.contains('chapter_versions')){
        const s = db.createObjectStore('chapter_versions', {keyPath:'id'});
        s.createIndex('chapterId','chapterId');
      }
      if(!db.objectStoreNames.contains('chat_threads')){
        const s = db.createObjectStore('chat_threads', {keyPath:'id'});
        s.createIndex('novelId','novelId');
      }
    };
    req.onsuccess = () => { _db = req.result; resolve(_db); };
    req.onerror = () => reject(req.error);
  });
}
async function dbPutRaw(store, obj){ const db = await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(store,'readwrite'); tx.objectStore(store).put(obj); tx.oncomplete=()=>res(obj); tx.onerror=()=>rej(tx.error); }); }
async function dbDeleteRaw(store, id){ const db = await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(store,'readwrite'); tx.objectStore(store).delete(id); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }
async function dbPut(store, obj){
  const result = await dbPutRaw(store, obj);
  if(typeof mirrorPutToCloud === 'function') mirrorPutToCloud(store, obj);
  return result;
}
async function dbDelete(store, id){
  await dbDeleteRaw(store, id);
  if(typeof mirrorDeleteToCloud === 'function') mirrorDeleteToCloud(store, id);
}
async function dbGet(store, id){ const db = await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(store,'readonly'); const rq=tx.objectStore(store).get(id); rq.onsuccess=()=>res(rq.result); rq.onerror=()=>rej(rq.error); }); }
async function dbGetAll(store){ const db = await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(store,'readonly'); const rq=tx.objectStore(store).getAll(); rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>rej(rq.error); }); }
async function dbGetByIndex(store, indexName, value){ const db = await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(store,'readonly'); const rq=tx.objectStore(store).index(indexName).getAll(value); rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>rej(rq.error); }); }

/* ---------- chapter version history ---------- */
const VERSION_MIN_GAP_MS = 10 * 60 * 1000; // don't snapshot more than once per 10 min of active editing
const VERSION_MAX_KEEP = 20;
async function snapshotChapterVersion(chapter){
  const versions = await dbGetByIndex('chapter_versions','chapterId',chapter.id);
  const rec = { id: uid(), chapterId: chapter.id, novelId: chapter.novelId, title: chapter.title, content: chapter.content, wordCount: wordCount(chapter.content), savedAt: Date.now() };
  await dbPutRaw('chapter_versions', rec);
  const all = [...versions, rec].sort((a,b) => b.savedAt - a.savedAt);
  if(all.length > VERSION_MAX_KEEP){
    for(const old of all.slice(VERSION_MAX_KEEP)){ await dbDeleteRaw('chapter_versions', old.id); }
  }
  return rec;
}
async function maybeSnapshotChapter(chapter){
  const versions = await dbGetByIndex('chapter_versions','chapterId',chapter.id);
  if(versions.length === 0){
    if((chapter.content||'').trim().length > 0) await snapshotChapterVersion(chapter);
    return;
  }
  const latest = versions.reduce((a,b) => a.savedAt > b.savedAt ? a : b);
  if(Date.now() - latest.savedAt >= VERSION_MIN_GAP_MS) await snapshotChapterVersion(chapter);
}

const MILESTONES = [
  { id:'first_novel',    label:'World Builder',     desc:'Create your first novel',                 icon:'book',     check:s=>s.novelCount>=1 },
  { id:'first_chapter',  label:'First Words',       desc:'Write your first chapter',                icon:'fileText', check:s=>s.chapterCount>=1 },
  { id:'first_framework',label:'Keeper of Canon',   desc:'Add your first framework entry',          icon:'link',     check:s=>s.frameworkCount>=1 },
  { id:'ten_chapters',   label:'Ten Chapters Deep', desc:'Reach 10 chapters in one novel',           icon:'compass',  check:s=>s.maxChaptersInNovel>=10 },
  { id:'words_10k',      label:'10,000 Words',      desc:'Write 10,000 words total',                icon:'sparkles', check:s=>s.totalWords>=10000 },
  { id:'words_50k',      label:'50,000 Words',      desc:'Write 50,000 words \u2014 novel-length territory', icon:'sparkles', check:s=>s.totalWords>=50000 },
  { id:'three_novels',   label:'Multiverse',        desc:'Create 3 novels',                          icon:'globe',    check:s=>s.novelCount>=3 },
  { id:'first_complete', label:'The End',           desc:'Mark a novel Complete',                    icon:'shield',   check:s=>s.completeCount>=1 }
];
async function computeMilestoneStats(){
  const [novels, chapters, framework] = await Promise.all([
    dbGetAll('novels'), dbGetAll('chapters'), dbGetAll('framework')
  ]);
  const perNovel = {};
  for(const c of chapters) perNovel[c.novelId] = (perNovel[c.novelId]||0) + 1;
  return {
    novelCount: novels.length,
    chapterCount: chapters.length,
    frameworkCount: framework.length,
    totalWords: chapters.reduce((sum,c)=>sum+wordCount(c.content),0),
    maxChaptersInNovel: Object.values(perNovel).reduce((m,v)=>Math.max(m,v),0),
    completeCount: novels.filter(n=>n.status==='complete').length
  };
}
async function checkMilestones(){
  const stats = await computeMilestoneStats();
  const s = Settings.get();
  const unlocked = new Set(s.unlockedMilestones || []);
  if(!s.milestonesBaselined){
    // First time this system runs against this data (fresh install, or an
    // existing library that predates achievements). Anything already true
    // gets marked done silently — it wasn't just earned, so it shouldn't
    // celebrate. Only crossings from here on do.
    for(const m of MILESTONES){ if(m.check(stats)) unlocked.add(m.id); }
    Settings.set({ unlockedMilestones: Array.from(unlocked), milestonesBaselined: true });
    return stats;
  }
  const newly = [];
  for(const m of MILESTONES){
    if(!unlocked.has(m.id) && m.check(stats)){ unlocked.add(m.id); newly.push(m); }
  }
  if(newly.length){
    Settings.set({ unlockedMilestones: Array.from(unlocked) });
    queueCelebrations(newly);
  }
  return stats;
}
let _celebrationQueue = [];
let _celebrating = false;
function queueCelebrations(list){
  _celebrationQueue.push(...list);
  if(!_celebrating) playNextCelebration();
}
function playNextCelebration(){
  const m = _celebrationQueue.shift();
  if(!m){ _celebrating = false; return; }
  _celebrating = true;
  showCelebration(m);
  setTimeout(playNextCelebration, 2600);
}
function showCelebration(m){
  const el = document.createElement('div');
  el.className = 'celebrate-overlay';
  el.innerHTML = `
    <div class="celebrate-card">
      <div class="celebrate-confetti">${Array.from({length:14}).map((_,i)=>`<span style="--i:${i}"></span>`).join('')}</div>
      <div class="celebrate-icon">${icon(m.icon,26)}</div>
      <div class="celebrate-label">Milestone unlocked</div>
      <div class="celebrate-title">${esc(m.label)}</div>
      <div class="celebrate-desc">${esc(m.desc)}</div>
    </div>`;
  document.body.appendChild(el);
  el.onclick = () => dismissCelebration(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => dismissCelebration(el), 2300);
}
function dismissCelebration(el){
  if(!el.isConnected) return;
  el.classList.remove('show');
  setTimeout(() => el.remove(), 300);
}

const FW_CATS = [
  {key:'characters', label:'Characters', icon:'users'},
  {key:'factions', label:'Factions', icon:'shield'},
  {key:'threads', label:'Threads', icon:'link'},
  {key:'geography', label:'Geography', icon:'map'},
  {key:'powersystem', label:'Systems', icon:'zap'},
  {key:'worldnotes', label:'World Notes', icon:'compass'}
];
const FW_IMAGE_CATS = ['characters','geography']; // categories where an entry can carry a reference image

const FW_FIELDS = {
  characters: [
    ['name','Name'],
    ['role','Role', ['Protagonist','Deuteragonist','Antagonist','Supporting','Minor']],
    ['faction','Faction / Affiliation'],
    ['appearance','Appearance'],
    ['personality','Personality'],
    ['background','Background'],
    ['inheritance','Abilities / Powers (if any)'],
    ['tier','Tier / Rank (if any)'],
    ['status','Status'],
    ['relationships','Relationships'],
    ['notes','Other Notes']
  ],
  factions: [['name','Name'],['leader','Leader'],['members','Known Members'],['goal','Goal / Ideology'],['territory','Territory / Base'],['relations','Relations'],['notes','Other Notes']],
  threads: [
    ['title','Title'],
    ['type','Type', ['Mystery','Subplot','Dangling Thread']],
    ['status','Status', ['Active','Dormant','Resolved']],
    ['introduced','Introduced (chapter / context)'],
    ['affected','Affected Characters'],
    ['lastReferenced','Last Referenced'],
    ['clues','Clues / Beats'],
    ['questions','Open Questions'],
    ['resolution','Resolution']
  ],
  geography: [['name','Name'],['type','Type'],['notes','Notes']],
  powersystem: [['tier','Tier / Level'],['description','Description']],
  worldnotes: [['title','Title'],['content','Content']]
};
const GENRE_PROFILES = {
  progression: { label:'Progression / System', categories: FW_CATS.map(c=>c.key), hiddenCharFields: [] },
  general: { label:'General Fiction', categories: ['characters','factions','threads','geography','worldnotes'], hiddenCharFields: ['tier','inheritance'] }
};
function novelProfile(novel){ return GENRE_PROFILES[novel && novel.genreProfile] || GENRE_PROFILES.progression; }
function visibleCatKeys(novel){ return novelProfile(novel).categories; }
function visibleFwCats(novel){ const keys = visibleCatKeys(novel); return FW_CATS.filter(c => keys.includes(c.key)); }
function visibleFwFields(novel, cat){
  const hidden = novelProfile(novel).hiddenCharFields || [];
  if(cat !== 'characters' || hidden.length === 0) return FW_FIELDS[cat];
  return FW_FIELDS[cat].filter(f => !hidden.includes(f[0]));
}
function fwFieldSchemaTextFor(novel){
  return visibleFwCats(novel).map(c => {
    const fields = visibleFwFields(novel, c.key).map(f => f[2] ? `${f[0]} (one of: ${f[2].join(', ')})` : f[0]).join(', ');
    return `- ${c.label} (category: "${c.key}") — fields: ${fields}`;
  }).join('\n');
}
function frameworkTools(novel){
  const enumKeys = visibleCatKeys(novel);
  return FRAMEWORK_TOOLS_BASE.map(t => ({
    ...t,
    parameters: { ...t.parameters, properties: { ...t.parameters.properties, category: { type:'STRING', enum: enumKeys } } }
  }));
}
function fwPrimary(cat, item){ return item.fields[FW_FIELDS[cat][0][0]] || 'Untitled'; }
function fwSecondary(cat, item){
  const f = item.fields;
  if(cat==='characters') return [f.role, f.faction, f.tier].filter(Boolean).join(' · ');
  if(cat==='factions') return f.leader || '';
  if(cat==='threads') return [f.type, f.status].filter(Boolean).join(' · ');
  if(cat==='geography') return f.type || '';
  if(cat==='powersystem') return '';
  return '';
}

function computeBacklinks(targetId){
  const target = S.frameworkCache.find(i => i.id === targetId);
  if(!target) return [];
  const targetName = fwPrimary(target.category, target).trim().toLowerCase();
  if(!targetName || targetName === 'untitled') return [];
  return S.frameworkCache.filter(item => {
    if(item.id === targetId) return false;
    return Object.values(item.fields||{}).some(v => String(v||'').toLowerCase().includes(targetName));
  });
}
function linkifyEntityMentions(text, excludeId){
  const candidates = S.frameworkCache
    .filter(i => i.id !== excludeId)
    .map(i => ({ id: i.id, name: fwPrimary(i.category, i) }))
    .filter(c => c.name && c.name !== 'Untitled')
    .sort((a,b) => b.name.length - a.name.length); // match longer names first to avoid partial overlaps
  let remaining = text;
  const segments = [];
  while(remaining.length > 0){
    let matched = null, matchIdx = -1;
    for(const c of candidates){
      const idx = remaining.toLowerCase().indexOf(c.name.toLowerCase());
      if(idx !== -1 && (matchIdx === -1 || idx < matchIdx)){ matched = c; matchIdx = idx; }
    }
    if(!matched){ segments.push(esc(remaining)); break; }
    if(matchIdx > 0) segments.push(esc(remaining.slice(0, matchIdx)));
    const matchedText = remaining.slice(matchIdx, matchIdx + matched.name.length);
    segments.push(`<span class="rel-link" data-fw-link="${matched.id}">${esc(matchedText)}</span>`);
    remaining = remaining.slice(matchIdx + matched.name.length);
  }
  return segments.join('');
}
function coverColor(seed){
  let h = 0; for(const c of String(seed)) h = (h*31 + c.charCodeAt(0)) % 360;
  return `hsl(${h}, 38%, 30%)`;
}

            <button class="tb-btn" style="width:28px;height:28px;" data-move="up" data-id="${c.id}">${icon('arrowUp',14)}</button>
            <button class="tb-btn" style="width:28px;height:28px;" data-move="down" data-id="${c.id}">${icon('arrowDown',14)}</button>
          </div>
        </div>
      </div>`).join('');
  }
  const stats = computeWritingStats(chapters);
  const statsStrip = chapters.length > 0 ? `
    <div class="card" style="display:flex; gap:14px; font-family:var(--font-mono); font-size:11px; color:var(--text-muted); padding:10px 14px;">
      <span>🔥 ${stats.streak}d streak</span>
      <span>${stats.wordsThisWeek.toLocaleString()} words this wk</span>
      <span>${stats.totalWords.toLocaleString()} total</span>
    </div>` : '';
  return `
    <div class="section-pad" style="overflow-y:auto;">
      ${statsStrip}
      ${list}
    </div>
    <div style="position:fixed; bottom:calc(env(safe-area-inset-bottom) + 84px); right:20px; z-index:30; display:flex; flex-direction:column; gap:10px;">
      ${chapters.length>0 ? `<button class="fab" id="btnExportManuscript" style="position:static; background:var(--voice);">${icon('download',19)}</button>` : ''}
      <button class="fab" id="btnNewChapter" style="position:static;">${icon('plus',24)}</button>
    </div>
  `;
}
function computeWritingStats(chapters){
  const totalWords = chapters.reduce((s,c)=>s+wordCount(c.content),0);
  const dayKey = (ts) => { const d = new Date(ts); return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate(); };
  const activeDays = new Set(chapters.map(c => dayKey(c.updatedAt||c.createdAt)));
  let streak = 0;
  let cursor = new Date();
  while(activeDays.has(dayKey(cursor.getTime()))){
    streak++;
    cursor.setDate(cursor.getDate()-1);
  }
  const weekAgo = Date.now() - 7*86400000;
  const wordsThisWeek = chapters.filter(c => (c.updatedAt||c.createdAt) >= weekAgo).reduce((s,c)=>s+wordCount(c.content),0);
  return { totalWords, streak, wordsThisWeek };
}
async function exportManuscript(){
  const novel = await dbGet('novels', S.novelId);
  const chapters = (await dbGetByIndex('chapters','novelId',S.novelId)).sort((a,b)=>a.order-b.order);
  if(chapters.length === 0){ toast('No chapters to export'); return; }
  let text = novel.title + (novel.synopsis ? '\n\n' + novel.synopsis : '') + '\n\n';
  chapters.forEach((c,i) => {
    text += `\n\n${'='.repeat(36)}\n${c.title || 'Chapter ' + (i+1)}\n${'='.repeat(36)}\n\n${c.content||''}`;
  });
  if(navigator.share){
    try{ await navigator.share({ title: novel.title, text }); return; }catch(e){ /* user cancelled or unsupported, fall through */ }
  }
  const blob = new Blob([text], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = (novel.title||'manuscript').replace(/[^a-z0-9\-_ ]/gi,'').trim() + '.txt';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function fwFieldLinesHtml(cat, item, novel){
  const line = (def) => {
    const [k,label] = def;
    const v = item.fields[k];
    if(!v) return '';
    return `<div class="fw-field-line"><b>${label}</b><span>${linkifyEntityMentions(v, item.id)}</span></div>`;
  };
  const fields = visibleFwFields(novel, cat).slice(1);
  if(cat !== 'characters') return fields.map(line).join('');
  const byKey = Object.fromEntries(fields.map(f => [f[0], f]));
  return CHAR_SECTIONS.map(section => {
    const defs = section.keys.map(k => byKey[k]).filter(Boolean);
    const lines = defs.map(line).filter(Boolean).join('');
    if(!lines) return ''; // nothing filled in for this section — skip the header entirely
    return `<div class="fw-section" style="margin-bottom:10px;padding-top:10px;">
      <div class="fw-section-label" style="font-size:11px;margin-bottom:6px;">${esc(section.label)}</div>
      ${lines}
    </div>`;
  }).join('');
}

async function moveChapter(id, dir){
  const chapters = S.chaptersCache.slice();
  const idx = chapters.findIndex(c=>c.id===id);
  const swapIdx = dir==='up' ? idx-1 : idx+1;
  if(swapIdx<0 || swapIdx>=chapters.length) return;
  const a = chapters[idx], b = chapters[swapIdx];
  const tmp = a.order; a.order = b.order; b.order = tmp;
  await dbPut('chapters', a); await dbPut('chapters', b);
  await render();
}
async function touchNovelCount(){

function bindWrite(){
  const ch = S._writeDraft;
  document.getElementById('btnWriteBack').onclick = () => { history.back(); };
  document.getElementById('btnWriteStatus').onclick = async () => {
    ch.status = ch.status==='published' ? 'draft' : 'published';
    await dbPut('chapters', ch);
    render();
  };
  document.getElementById('btnWriteDelete').onclick = async () => {
    if(!confirm('Delete this chapter? This cannot be undone.')) return;
    const versions = await dbGetByIndex('chapter_versions','chapterId',ch.id);
    for(const v of versions) await dbDelete('chapter_versions', v.id);
    await dbDelete('chapters', ch.id);
    await touchNovelCount();
    history.back();
  };
  const titleEl = document.getElementById('writeTitle');
  const beatEl = document.getElementById('writeBeat');
  const bodyEl = document.getElementById('writeBody');
  const dot = document.getElementById('saveDot');
  const wcLabel = document.getElementById('wordCountLabel');

  // capture the as-opened state as a version checkpoint before any new edits
  maybeSnapshotChapter(ch);

  const save = debounce(async () => {
    ch.title = titleEl.value;
    ch.beat = beatEl.value;
    ch.content = bodyEl.value;
    ch.updatedAt = Date.now();
    await dbPut('chapters', ch);
    await touchNovelCount();
    await maybeSnapshotChapter(ch);
    dot.classList.add('saved');
  }, 600);

  const onEdit = () => {
    dot.classList.remove('saved');
    wcLabel.textContent = wordCount(bodyEl.value) + ' words';
    save();
  };
  titleEl.addEventListener('input', onEdit);
  beatEl.addEventListener('input', onEdit);
  bodyEl.addEventListener('input', onEdit);
  bodyEl.style.height = 'auto';
  if(!ch.title && !ch.content){ titleEl.focus(); }

  // --- editor toolbar ---
  function wrapSelection(marker){
    const start = bodyEl.selectionStart, end = bodyEl.selectionEnd;
    const val = bodyEl.value;
    const selected = val.slice(start, end);
    const before = val.slice(Math.max(0, start - marker.length), start);
    const after = val.slice(end, end + marker.length);
    let newVal, newStart, newEnd;
    if(selected && before === marker && after === marker){
      // already wrapped — unwrap instead of double-wrapping
      newVal = val.slice(0, start - marker.length) + selected + val.slice(end + marker.length);
      newStart = start - marker.length; newEnd = newStart + selected.length;
    } else if(selected){
      newVal = val.slice(0, start) + marker + selected + marker + val.slice(end);
      newStart = start + marker.length; newEnd = newStart + selected.length;
    } else {
      // nothing selected — drop markers at cursor with the cursor left between them
      newVal = val.slice(0, start) + marker + marker + val.slice(start);
      newStart = newEnd = start + marker.length;
    }
    bodyEl.value = newVal;
    bodyEl.setSelectionRange(newStart, newEnd);
    bodyEl.focus();
    onEdit();
  }
  document.getElementById('btnBold').onclick = () => wrapSelection('**');
  document.getElementById('btnItalic').onclick = () => wrapSelection('*');
  document.getElementById('btnSceneBreak').onclick = () => {
    const start = bodyEl.selectionStart;
    const val = bodyEl.value;
    const needsLeadingBreak = start > 0 && val[start-1] !== '\n';
    const insert = (needsLeadingBreak ? '\n\n' : '') + '* * *\n\n';
    bodyEl.value = val.slice(0, start) + insert + val.slice(start);
    const pos = start + insert.length;
    bodyEl.setSelectionRange(pos, pos);
    bodyEl.focus();
    onEdit();
  };
  document.getElementById('btnFontSize').onclick = (e) => {
    const order = ['small','medium','large'];
    const cur = Settings.get().editorFontSize || 'medium';
    const next = order[(order.indexOf(cur)+1) % order.length];
    Settings.set({ editorFontSize: next });
    bodyEl.style.fontSize = FONT_SIZES[next] + 'px';
    e.currentTarget.innerHTML = fontBtnHtml(next);
    toast('Text size: ' + FONT_NAMES[next]);
  };
  document.getElementById('btnEditorTheme').onclick = (e) => {
    const cur = document.documentElement.getAttribute('data-theme') || 'light';
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    Settings.set({ theme: next });
    document.querySelector('meta[name=theme-color]').setAttribute('content', next==='dark'?'#131009':'#FFFFFF');
    e.currentTarget.innerHTML = icon(next==='dark'?'sun':'moon',16);
  };
  document.getElementById('btnGoTop').onclick = () => {
    bodyEl.focus();
    bodyEl.setSelectionRange(0, 0);
    requestAnimationFrame(() => { bodyEl.scrollTop = 0; });
  };
  document.getElementById('btnGoBottom').onclick = () => {
    bodyEl.focus();
    const end = bodyEl.value.length;
    bodyEl.setSelectionRange(end, end);
    requestAnimationFrame(() => { bodyEl.scrollTop = bodyEl.scrollHeight; });
  };
  document.getElementById('btnVersionHistory').onclick = () => openSheet('versionHistory', { chapterId: ch.id });
  const writeViewEl = document.getElementById('writeView');
  document.getElementById('btnFocusMode').onclick = () => { writeViewEl.classList.add('focus-mode'); bodyEl.focus(); };
  document.getElementById('btnExitFocus').onclick = () => { writeViewEl.classList.remove('focus-mode'); };
  document.getElementById('btnShareChapter').onclick = async () => {
    const text = (titleEl.value ? titleEl.value + '\n\n' : '') + bodyEl.value;
    if(navigator.share){
      try{ await navigator.share({ title: titleEl.value || 'Chapter', text }); return; }catch(e){ /* user cancelled or unsupported, fall through */ }
    }
    const blob = new Blob([text], {type:'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = (titleEl.value || 'chapter').replace(/[^a-z0-9\-_ ]/gi,'').trim() + '.txt';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };
}

async function renderPlatforms(){
  await ensurePlatformSeeds();
  const platforms = (await dbGetAll('platforms')).sort((a,b)=>a.name.localeCompare(b.name));
  return `
    <div class="view active">
      <div class="topbar">
        <button class="tb-btn" id="btnPlatformsBack">${icon('arrowLeft',19)}</button>
        <span class="tb-title">Platforms</span>
        <span style="width:36px"></span>
      </div>
      <div class="section-pad" style="overflow-y:auto;">
        ${platforms.map(p=>platformCard(p)).join('')}
        <div class="field" style="margin-top:10px;">
          <label>Optional genre</label>
          <input type="text" id="discoverGenreInput" placeholder="e.g. romance, litRPG, isekai">
        </div>
        <button class="btn voice-btn" id="btnDiscoverPlatforms">${icon('sparkles',16)} Discover more</button>
        <div id="discoverStatus" style="font-size:13px;color:var(--text-muted);min-height:20px;margin-top:8px;text-align:center;"></div>
      </div>
    </div>
  `;
}
function platformCard(p){
  const initial = (p.name||'?').trim().charAt(0).toUpperCase();
  const color = coverColor(p.id);
  return `
    <div class="card" style="display:flex;gap:12px;align-items:flex-start;">
      <a href="${esc(p.url||'#')}" target="_blank" rel="noopener noreferrer" style="display:flex;gap:12px;align-items:flex-start;text-decoration:none;color:inherit;flex:1;min-width:0;">
        <div style="width:38px;height:38px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;color:#fff;background:${color};">${esc(initial)}</div>
        <div style="min-width:0;">
          <div class="card-title">${esc(p.name)}</div>
          <div class="card-sub">${esc(p.blurb||'')}</div>
        </div>
      </a>
      <button class="tb-btn" style="width:28px;height:28px;flex-shrink:0;" data-delete-platform="${p.id}">${icon('trash',14)}</button>
    </div>
  `;
}
async function bindPlatforms(){
  document.getElementById('btnPlatformsBack').onclick = () => { history.back(); };
  root().querySelectorAll('[data-delete-platform]').forEach(btn=>{
    btn.onclick = async () => {
      if(!confirm('Remove this platform from your list?')) return;
      await dbDelete('platforms', btn.dataset.deletePlatform);
      render();
    };
  });
  document.getElementById('btnDiscoverPlatforms').onclick = async (e) => {
    const btn = e.currentTarget;
    const statusEl = document.getElementById('discoverStatus');
    const genre = document.getElementById('discoverGenreInput').value.trim();
    const s = Settings.get();
    if(!s.geminiKey){ toast('Add your Gemini API key in Settings first'); return; }
    const original = btn.innerHTML;
    btn.innerHTML = `<span class="spinner"></span> Searching…`;
    btn.disabled = true;
    try{
      const added = await discoverMorePlatforms(genre);
      statusEl.textContent = added > 0 ? `Added ${added} new platform(s).` : 'No new platforms found.';
      render();
    }catch(err){
      statusEl.textContent = 'Search failed: ' + err.message;
      btn.innerHTML = original; btn.disabled = false;
    }
  };
}

function bindSettings(){
  document.getElementById('btnSettingsBack').onclick = () => { history.back(); };
  (async () => {
    const stats = await computeMilestoneStats();
    const unlocked = new Set(Settings.get().unlockedMilestones || []);
    const wrap = document.getElementById('achievementsWrap');
    if(!wrap) return;
    wrap.innerHTML = MILESTONES.map(m => {
      const done = unlocked.has(m.id) || m.check(stats);
      return `
        <div class="card-row achievement-row ${done?'done':'locked'}">
          <div class="achievement-icon">${icon(m.icon,17)}</div>
          <div style="min-width:0;flex:1;">
            <div class="card-title" style="font-size:13.5px;">${esc(m.label)}</div>
            <div class="card-sub" style="font-size:11.5px;">${esc(m.desc)}</div>
          </div>
          ${done ? `<span class="pill canon" style="font-size:10px;">Unlocked</span>` : ''}
        </div>`;
    }).join('');
  })();
  root().querySelectorAll('[data-theme-choice]').forEach(btn=>{
    btn.onclick = () => {
      const t = btn.dataset.themeChoice;
      document.documentElement.setAttribute('data-theme', t);
      Settings.set({theme:t});
      document.querySelector('meta[name=theme-color]').setAttribute('content', t==='dark'?'#131009':'#FFFFFF');
      render();
    };
  });
  document.getElementById('btnSaveGemini').onclick = () => {
    Settings.set({
      geminiKey: document.getElementById('geminiKeyInput').value.trim(),
      geminiPreferredModel: document.getElementById('geminiPreferredInput').value.trim()
    });
    toast('Saved');
  };
  document.getElementById('btnSavePenName').onclick = () => {
    const v = document.getElementById('penNameInput').value.trim();
    Settings.set({ penName: v });
    toast('Saved');
  };
  document.getElementById('btnSaveStale').onclick = () => {
    const n = parseInt(document.getElementById('staleThresholdInput').value, 10);
    Settings.set({ staleThreshold: (n && n > 0) ? n : 15 });
    toast('Saved');
  };
  const btnGoogleSignIn = document.getElementById('btnGoogleSignIn');
  if(btnGoogleSignIn) btnGoogleSignIn.onclick = signInWithGoogle;
  const btnCloudEmailContinue = document.getElementById('btnCloudEmailContinue');
  if(btnCloudEmailContinue) btnCloudEmailContinue.onclick = async () => {
    const errEl = document.getElementById('cloudAuthError');
    const showErr = (msg) => { errEl.textContent = msg; };
    if(!_cloudApp){ showErr('Still connecting — try again in a moment.'); return; }
    const email = document.getElementById('cloudEmailInput').value.trim();
    const password = document.getElementById('cloudPasswordInput').value;
    if(!email || !password){ showErr('Enter both an email and a password.'); return; }
    showErr('');
    try{
      await emailPasswordContinue(email, password);
      render();
    }catch(e){
      showErr(e.message || 'Something went wrong — try again.');
    }
  };
  const btnSignOutCloud = document.getElementById('btnSignOutCloud');
  if(btnSignOutCloud) btnSignOutCloud.onclick = signOutCloud;
  document.getElementById('btnTestGemini').onclick = async (e) => {
    const btn = e.currentTarget;
    Settings.set({
      geminiKey: document.getElementById('geminiKeyInput').value.trim(),
      geminiPreferredModel: document.getElementById('geminiPreferredInput').value.trim()
    });
    const original = btn.innerHTML;
    btn.innerHTML = `<span class="spinner"></span> Testing...`;
    btn.disabled = true;
    try{
      const s2 = Settings.get();
      if(!s2.geminiKey) throw new Error('Add an API key first.');
      Settings.set({ geminiWorkingModel: '' }); // force fresh discovery
      const { model } = await resolveAndCallGemini(s2.geminiKey, { contents: [{ parts: [{ text: 'Reply with just the word: OK' }] }] }, false);
      toast('Connected — using ' + model);
    }catch(err){
      toast('Failed: ' + err.message);
    }
    btn.innerHTML = original;
    btn.disabled = false;
    render();
  };
  document.getElementById('btnExportData').onclick = exportAllData;
  document.getElementById('btnClearData').onclick = async () => {
    if(!confirm('This deletes every novel, chapter, and framework entry on this device. Continue?')) return;
    if(!confirm('Really sure? This cannot be undone.')) return;
    const db = await openDB();
    ['novels','chapters','framework','chatlogs','chat_threads','chapter_versions'].forEach(store=>{
      db.transaction(store,'readwrite').objectStore(store).clear();
    });
    // Achievements and "have I onboarded" are derived from novel data —
    // erasing the data but leaving those behind is exactly the stale-state
    // bug this is fixing, so they reset together, not separately.
    Settings.set({ unlockedMilestones: [], milestonesBaselined: false, onboarded: false });
    toast('All data erased');
    setTimeout(()=>{ S.route='login'; render(); }, 400);
  };
}
async function exportAllData(){
  const novels = await dbGetAll('novels');
  const chapters = await dbGetAll('chapters');
  const framework = await dbGetAll('framework');
  const chatlogs = await dbGetAll('chatlogs');
  const data = { exportedAt: new Date().toISOString(), novels, chapters, framework, chatlogs };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'canon-backup-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Backup downloaded');
}

function compressImageFile(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if(width > maxDim || height > maxDim){
          if(width >= height){ height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        try{
          resolve(canvas.toDataURL('image/jpeg', quality));
        }catch(e){ reject(e); }
      };
      img.onerror = () => reject(new Error('Could not read that image'));
      img.src = reader.result;
    };
    reader.onerror = () => reject(new Error('Could not read that file'));
    reader.readAsDataURL(file);
  });
}

async function performSearch(novelId, query){
  const q = query.trim().toLowerCase();
  if(q.length < 2) return { chapters:[], framework:[] };
  const chapters = await dbGetByIndex('chapters','novelId',novelId);
  const framework = await dbGetByIndex('framework','novelId',novelId);
  const chapterHits = chapters.filter(c => (c.title||'').toLowerCase().includes(q) || (c.content||'').toLowerCase().includes(q));
  const fwHits = framework.filter(item => Object.values(item.fields||{}).some(v => String(v||'').toLowerCase().includes(q)));
  return { chapters: chapterHits, framework: fwHits };
}
function matchSnippet(text, q, pad){
  pad = pad || 40;
  const idx = text.toLowerCase().indexOf(q.trim().toLowerCase());
  if(idx === -1) return text.slice(0, 80);
  const start = Math.max(0, idx - pad);
  const end = Math.min(text.length, idx + q.length + pad);
  return (start > 0 ? '…' : '') + text.slice(start, end) + (end < text.length ? '…' : '');
}

const CHAR_SECTIONS = [
  { label:'Identity', keys:['name','role','faction'] },
  { label:'Appearance', keys:['appearance'] },
  { label:'Personality', keys:['personality'] },
  { label:'Background', keys:['background'] },
  { label:'Combat / Powers', keys:['inheritance','tier'] },
  { label:'Story & Relationships', keys:['status','relationships'] },
  { label:'Other Notes', keys:['notes'] }
];
function fwFieldsHtml(cat, item, novel){
  const fields = visibleFwFields(novel, cat);
  const renderField = (def) => {
    const [k,label,options] = def;
    const val = item && item.fields ? (item.fields[k]||'') : '';
    if(options){
      return `<div class="field"><label>${label}</label><select data-fwfield="${k}">
        <option value="">Select...</option>
        ${options.map(o=>`<option value="${esc(o)}" ${val===o?'selected':''}>${esc(o)}</option>`).join('')}
      </select></div>`;
    }
    const multi = ['description','members','content','notes','clues','questions','resolution','appearance','personality','background'].includes(k);
    return `<div class="field"><label>${label}</label>${multi
      ? `<textarea rows="3" data-fwfield="${k}">${esc(val)}</textarea>`
      : `<input type="text" data-fwfield="${k}" value="${esc(val)}">`}</div>`;
  };
  if(cat !== 'characters'){
    return fields.map(renderField).join('');
  }
  // characters get grouped into scannable dossier sections instead of one flat list
  const byKey = Object.fromEntries(fields.map(f => [f[0], f]));
  return CHAR_SECTIONS.map(section => {
    const defs = section.keys.map(k => byKey[k]).filter(Boolean);
    if(defs.length === 0) return ''; // whole section hidden (e.g. Combat/Powers on a General Fiction novel)
    return `<div class="fw-section">
      <div class="fw-section-label">${esc(section.label)}</div>
      ${defs.map(renderField).join('')}
    </div>`;
  }).join('');
}
