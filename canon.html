  --shadow: 0 1px 2px rgba(0,0,0,0.2), 0 6px 20px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.3);
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
  transition:background 0.25s ease, color 0.25s ease;
}
button{font-family:inherit; cursor:pointer;}
input,textarea,select{font-family:inherit;}
::selection{background:var(--canon-soft); color:var(--canon-deep);}

.icon{width:20px; height:20px; display:inline-block; flex-shrink:0;}
.icon svg{width:100%; height:100%; display:block;}

#app{
  max-width:560px;
  margin:0 auto;
  min-height:100vh;
  position:relative;
  background:var(--bg);
  display:flex;
  flex-direction:column;
}

.view{ display:none; flex-direction:column; flex:1; min-height:0; }
.view.active{ display:flex; }

/* ---------- Header ---------- */
.topbar{
  position:sticky; top:0; z-index:20;
  display:flex; align-items:center; gap:10px;
  padding:calc(env(safe-area-inset-top) + 14px) 18px 12px;
  background:var(--bg);
  border-bottom:1px solid var(--border-soft);
}
.topbar .tb-title{
  font-family:var(--font-display); font-weight:600; font-size:19px;
  flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.tb-btn{
  width:36px; height:36px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background:transparent; border:none; color:var(--text);
}
.tb-btn:active{ background:var(--surface); }
.tb-btn.filled{ background:var(--canon); color:#fff; }

/* ---------- Home / bookshelf ---------- */
.shelf{
  display:grid; grid-template-columns:repeat(2,1fr); gap:16px;
  padding:18px 20px 100px;
}
.book-tile{
  display:flex; flex-direction:column; gap:8px;
  animation:riseIn 0.4s ease both;
}
.book-cover{
  position:relative; aspect-ratio:2/3; border-radius:var(--radius-s);
  overflow:hidden; background:var(--surface); border:1px solid var(--border-soft);
  box-shadow:var(--shadow);
  display:flex; align-items:flex-end;
}
.book-cover img{ width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
.book-cover .fallback-label{
  position:relative; z-index:1; padding:14px; font-family:var(--font-display);
  font-weight:600; font-size:15px; color:#fff; line-height:1.25;
}
.book-cover .spine-shade{
  position:absolute; inset:0; background:linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.55) 100%);
}
.book-meta .b-title{
  font-family:var(--font-display); font-weight:600; font-size:14px; line-height:1.3;
  overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
}
.book-meta .b-sub{
  font-family:var(--font-mono); font-size:10.5px; color:var(--text-faint); margin-top:2px;
}
.book-tile.add-tile .book-cover{
  align-items:center; justify-content:center; border:1.5px dashed var(--border);
  box-shadow:none; background:var(--surface);
}
.book-tile.add-tile .icon{ width:26px; height:26px; color:var(--text-faint); }

@keyframes riseIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

.empty-state{
  margin:40px 20px; text-align:center; padding:36px 20px;
  border:1px dashed var(--border); border-radius:var(--radius-m); color:var(--text-muted);
}
.empty-state .icon{ width:30px; height:30px; margin:0 auto 10px; color:var(--text-faint); }
.empty-state h3{ font-family:var(--font-display); font-size:17px; margin:0 0 4px; color:var(--text); }
.empty-state p{ font-size:13px; margin:0; }

/* ---------- Bottom nav ---------- */
.bottom-nav{
  position:sticky; bottom:0; z-index:20;
  display:flex; background:var(--bg);
  border-top:1px solid var(--border-soft);
  padding:8px 6px calc(env(safe-area-inset-bottom) + 8px);
}
.nav-btn{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  background:none; border:none; color:var(--text-faint); padding:6px 2px; border-radius:12px;
}
.nav-btn .icon{ width:21px; height:21px; }
.nav-btn span{ font-size:10px; font-weight:600; letter-spacing:0.01em; }
.nav-btn.active{ color:var(--canon); }

/* ---------- Cards / lists ---------- */
.section-pad{ padding:16px 18px 100px; flex:1; overflow-y:auto; }
.card{
  background:var(--surface-raised); border:1px solid var(--border-soft);
  border-radius:var(--radius-m); padding:14px 15px; margin-bottom:10px; box-shadow:var(--shadow);
}
.card-row{ display:flex; align-items:center; gap:12px; }
.card-title{ font-family:var(--font-display); font-weight:600; font-size:15.5px; }
.card-sub{ font-size:12.5px; color:var(--text-muted); margin-top:2px; }
.pill{
  display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:99px;
  font-size:10.5px; font-weight:600; font-family:var(--font-mono); letter-spacing:0.02em;
}
.pill.canon{ background:var(--canon-soft); color:var(--canon-deep); }
.pill.voice{ background:var(--voice-soft); color:var(--voice-deep); }
.pill.alert{ background:var(--alert-soft); color:var(--alert-deep); }
.pill.neutral{ background:var(--surface); color:var(--text-muted); border:1px solid var(--border-soft); }

.chip-row{ display:flex; gap:8px; overflow-x:auto; padding:2px 18px 14px; scrollbar-width:none; }
.chip-row::-webkit-scrollbar{ display:none; }
.chip{
  flex-shrink:0; padding:8px 14px; border-radius:99px; font-size:12.5px; font-weight:600;
  background:var(--surface); border:1px solid var(--border-soft); color:var(--text-muted);
  display:flex; align-items:center; gap:6px; white-space:nowrap;
}
.chip.active{ background:var(--text); color:var(--bg); border-color:var(--text); }

.fab{
  position:fixed; z-index:30; bottom:calc(env(safe-area-inset-bottom) + 84px); right:calc(50% - 260px + 20px);
  width:44px; height:44px; border-radius:50%; background:var(--canon); color:#fff; border:none;
  display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-lg);
}
@media (max-width:600px){ .fab{ right:18px; } }
.fab .icon{ width:19px; height:19px; }

/* ---------- Home: list rows (default) ---------- */
.shelf-list{ padding:6px 14px 90px; }
.book-row{
  display:flex; align-items:center; gap:12px; padding:11px 4px;
  border-bottom:1px solid var(--border-soft);
}
.book-row-thumb{
  width:46px; height:46px; border-radius:9px; overflow:hidden; flex-shrink:0;
  background:var(--surface); border:1px solid var(--border-soft);
  display:flex; align-items:center; justify-content:center; color:var(--text-faint);
}
.book-row-thumb img{ width:100%; height:100%; object-fit:cover; object-position:center top; }
.book-row-info{ flex:1; min-width:0; }
.book-row-info .b-title{ font-family:var(--font-display); font-weight:600; font-size:14.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.book-row-stats{ display:flex; align-items:center; gap:12px; margin-top:3px; font-family:var(--font-mono); font-size:11px; color:var(--text-faint); }
.book-row-stats .stat{ display:flex; align-items:center; gap:4px; }
.book-row-stats .stat .icon{ width:12px; height:12px; }

.home-topline{ display:flex; align-items:center; justify-content:flex-end; gap:6px; padding:10px 14px 0; }

.empty-mid{
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:10px; padding:20px; text-align:center;
}
.empty-mid .icon{ width:26px; height:26px; color:var(--text-faint); }
.empty-mid h3{ font-family:var(--font-display); font-size:16px; margin:0; color:var(--text); font-weight:600; }

.home-credit{
  text-align:center; padding:18px 0 8px;
  font-family:var(--font-display); font-style:italic; font-weight:500;
  font-size:16px; letter-spacing:0.01em; color:var(--canon);
}
.home-credit::before{ content:"— "; opacity:0.6; }

/* ---------- Editor toolbar ---------- */
.editor-toolbar-row{
  display:flex; align-items:center; gap:4px; padding:6px 14px; border-bottom:1px solid var(--border-soft);
}
.et-btn{
  width:32px; height:32px; border-radius:9px; border:none; background:none; color:var(--text-muted);
  display:flex; align-items:center; justify-content:center;
}
.et-btn:active{ background:var(--surface); }
.et-btn.text-btn{ font-family:var(--font-mono); font-weight:700; font-size:13px; }
.editor-toolbar-row .spacer{ flex:1; }

/* ---------- Forms / modals ---------- */
.sheet-backdrop{
  position:fixed; inset:0; background:rgba(20,17,10,0.45); z-index:50;
  display:none; align-items:flex-end; justify-content:center;
}
.sheet-backdrop.active{ display:flex; }
.sheet{
  width:100%; max-width:560px; background:var(--bg); border-radius:22px 22px 0 0;
  max-height:88vh; overflow-y:auto; padding:18px 20px calc(env(safe-area-inset-bottom) + 24px);
  animation:sheetUp 0.25s cubic-bezier(.2,.8,.3,1) both; box-shadow:var(--shadow-lg);
}
@keyframes sheetUp{ from{ transform:translateY(24px); opacity:0.6; } to{ transform:translateY(0); opacity:1; } }
.sheet-handle{ width:38px; height:4px; border-radius:99px; background:var(--border); margin:0 auto 14px; }
.sheet h2{ font-family:var(--font-display); font-size:20px; margin:0 0 14px; font-weight:600; }

.field{ margin-bottom:14px; }
.field label{ display:block; font-size:12px; font-weight:600; color:var(--text-muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.03em; }
.field input[type=text], .field input[type=password], .field textarea, .field select{
  width:100%; padding:11px 13px; border-radius:12px; border:1px solid var(--border);
  background:var(--surface); color:var(--text); font-size:14.5px; resize:vertical;
}
.field input:focus, .field textarea:focus, .field select:focus{
  outline:2px solid var(--canon); outline-offset:1px; background:var(--surface-raised);
}
.field-hint{ font-size:11.5px; color:var(--text-faint); margin-top:5px; }
.field-cover-upload{
  display:flex; align-items:center; gap:12px; padding:10px; border:1px dashed var(--border);
  border-radius:12px; background:var(--surface);
}
.field-cover-upload .thumb{ width:52px; height:76px; border-radius:6px; object-fit:cover; background:var(--border-soft); flex-shrink:0; }
.btn{
  width:100%; padding:13px; border-radius:12px; border:none; font-weight:600; font-size:14.5px;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn.primary{ background:var(--canon); color:#fff; }
.btn.ghost{ background:var(--surface); color:var(--text); border:1px solid var(--border); }
.btn.voice-btn{ background:var(--voice); color:#fff; }
.btn.danger{ background:var(--alert-soft); color:var(--alert-deep); }
.btn.small{ width:auto; padding:8px 14px; font-size:13px; }
.btn-row{ display:flex; gap:10px; }
.btn-row .btn{ flex:1; }

/* ---------- Write tab ---------- */
.write-toolbar{
  display:flex; align-items:center; gap:8px; padding:10px 16px; border-bottom:1px solid var(--border-soft);
  font-family:var(--font-mono); font-size:11.5px; color:var(--text-faint);
}
.write-toolbar .save-dot{ width:7px; height:7px; border-radius:50%; background:var(--border); transition:background 0.2s; }
.write-toolbar .save-dot.saved{ background:var(--voice); }
.write-title-input{
  width:100%; border:none; background:none; font-family:var(--font-display); font-weight:600;
  font-size:22px; padding:18px 20px 6px; color:var(--text);
}
.write-title-input:focus{ outline:none; }
.write-body{
  flex:1; border:none; background:none; resize:none; width:100%;
  padding:6px 20px 40px; font-size:16px; line-height:1.75; color:var(--text); font-family:var(--font-body);
}
.write-body:focus{ outline:none; }

/* ---------- Framework cards ---------- */
.fw-card .fw-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
.fw-field-line{ display:flex; gap:8px; font-size:12.5px; margin-top:6px; }
.fw-field-line b{ color:var(--text-muted); font-weight:600; flex-shrink:0; }
.fw-field-line span{ color:var(--text); }

/* ---------- Assistant ---------- */
.chat-scroll{ flex:1; overflow-y:auto; padding:14px 16px 12px; display:flex; flex-direction:column; gap:10px; }
.msg{ max-width:86%; padding:11px 14px; border-radius:16px; font-size:14px; line-height:1.5; }
.msg.user{ align-self:flex-end; background:var(--canon); color:#fff; border-bottom-right-radius:5px; }
.msg.ai{ align-self:flex-start; background:var(--voice-soft); color:var(--voice-deep); border-bottom-left-radius:5px; }
.msg.system{ align-self:center; background:var(--surface); color:var(--text-faint); font-size:12px; font-family:var(--font-mono); border-radius:10px; }
.chat-input-row{
  display:flex; gap:8px; padding:10px 14px calc(env(safe-area-inset-bottom) + 10px); border-top:1px solid var(--border-soft);
}
.chat-input-row textarea{
  flex:1; border:1px solid var(--border); border-radius:16px; padding:10px 14px; font-size:14px;
  resize:none; max-height:100px; background:var(--surface); color:var(--text);
}
.chat-send{
  width:42px; height:42px; border-radius:50%; background:var(--canon); color:#fff; border:none;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.chat-send:disabled{ opacity:0.4; }
.assist-actions{ display:flex; gap:8px; padding:12px 16px 2px; overflow-x:auto; scrollbar-width:none; }
.assist-actions::-webkit-scrollbar{ display:none; }
.assist-actions .chip{ background:var(--voice-soft); color:var(--voice-deep); border-color:transparent; }

/* ---------- Continuity check results (signature element) ---------- */
.cc-result{ border-radius:var(--radius-m); border:1px solid var(--border-soft); margin-bottom:12px; overflow:hidden; background:var(--surface-raised); box-shadow:var(--shadow); }
.cc-result .cc-tag{
  display:flex; align-items:center; gap:8px; padding:10px 14px; font-size:11.5px; font-weight:700;
  font-family:var(--font-mono); text-transform:uppercase; letter-spacing:0.04em;
}
.cc-result.conflict .cc-tag{ background:var(--alert-soft); color:var(--alert-deep); }
.cc-result.new .cc-tag{ background:var(--canon-soft); color:var(--canon-deep); }
.cc-result.thread .cc-tag{ background:var(--canon-soft); color:var(--canon-deep); }
.cc-result.stale .cc-tag{ background:var(--voice-soft); color:var(--voice-deep); }
.cc-result.question .cc-tag{ background:var(--voice-soft); color:var(--voice-deep); }
.cc-body{ padding:13px 14px 15px; }
.cc-compare{ display:flex; flex-direction:column; gap:8px; margin-top:6px; }
.cc-compare .cc-line{ display:flex; gap:8px; font-size:13px; line-height:1.5; }
.cc-compare .cc-line .cc-src{ font-family:var(--font-mono); font-size:10px; color:var(--text-faint); flex-shrink:0; width:64px; padding-top:2px; text-transform:uppercase; letter-spacing:0.03em; }
.cc-actions{ display:flex; gap:8px; margin-top:12px; }
.cc-actions .btn{ padding:9px; font-size:12.5px; }

/* ---------- Settings ---------- */
.settings-group{ margin-bottom:22px; }
.settings-group h4{ font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-faint); margin:0 0 10px; padding:0 2px; }
.seg-control{ display:flex; background:var(--surface); border-radius:12px; padding:3px; border:1px solid var(--border-soft); }
.seg-control button{ flex:1; padding:9px; border:none; background:none; border-radius:9px; font-size:13px; font-weight:600; color:var(--text-muted); display:flex; align-items:center; justify-content:center; gap:6px; }
.seg-control button.active{ background:var(--surface-raised); color:var(--text); box-shadow:var(--shadow); }
.about-block{ text-align:center; padding:20px 0 4px; color:var(--text-faint); font-size:12px; }
.about-block .app-mark{ width:44px; height:44px; margin:0 auto 10px; border-radius:12px; overflow:hidden; }
.about-block .app-mark img{ width:100%; height:100%; }
.about-block b{ color:var(--text); font-family:var(--font-display); font-size:15px; display:block; margin-bottom:2px; }

.toast{
  position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(10px); z-index:100;
  background:var(--text); color:var(--bg); padding:10px 18px; border-radius:99px; font-size:13px;
  opacity:0; transition:all 0.25s ease; pointer-events:none; white-space:nowrap; box-shadow:var(--shadow-lg);
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

.spinner{ width:16px; height:16px; border-radius:50%; border:2px solid rgba(255,255,255,0.35); border-top-color:#fff; animation:spin 0.7s linear infinite; }
.spinner.dark{ border:2px solid var(--border); border-top-color:var(--canon); }
@keyframes spin{ to{ transform:rotate(360deg); } }

.novel-header{ padding:14px 18px 4px; }
.novel-header .nh-title{ font-family:var(--font-display); font-weight:600; font-size:21px; }
.novel-header .nh-sub{ font-size:12px; color:var(--text-faint); font-family:var(--font-mono); margin-top:2px; }
</style>
</head>

/* ---------- tiny utils ---------- */
const uid = () => (crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now() + '-' + Math.random().toString(16).slice(2));

/* ---------- IndexedDB layer ---------- */
const DB_NAME = 'canon_db', DB_VERSION = 1;
let _db = null;
function openDB(){
  if(_db) return Promise.resolve(_db);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if(!db.objectStoreNames.contains('novels')) db.createObjectStore('novels', {keyPath:'id'});
      if(!db.objectStoreNames.contains('chapters')){
        const s = db.createObjectStore('chapters', {keyPath:'id'});
        s.createIndex('novelId','novelId');
      }
      if(!db.objectStoreNames.contains('framework')){
        const s = db.createObjectStore('framework', {keyPath:'id'});
        s.createIndex('novelId','novelId');
      }
      if(!db.objectStoreNames.contains('chatlogs')){
        const s = db.createObjectStore('chatlogs', {keyPath:'id'});
        s.createIndex('novelId','novelId');
      }
    };
    req.onsuccess = () => { _db = req.result; resolve(_db); };
    req.onerror = () => reject(req.error);
  });
}
async function dbPut(store, obj){ const db = await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(store,'readwrite'); tx.objectStore(store).put(obj); tx.oncomplete=()=>res(obj); tx.onerror=()=>rej(tx.error); }); }
async function dbGet(store, id){ const db = await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(store,'readonly'); const rq=tx.objectStore(store).get(id); rq.onsuccess=()=>res(rq.result); rq.onerror=()=>rej(rq.error); }); }
async function dbDelete(store, id){ const db = await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(store,'readwrite'); tx.objectStore(store).delete(id); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }
async function dbGetAll(store){ const db = await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(store,'readonly'); const rq=tx.objectStore(store).getAll(); rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>rej(rq.error); }); }
async function dbGetByIndex(store, indexName, value){ const db = await openDB(); return new Promise((res,rej)=>{ const tx=db.transaction(store,'readonly'); const rq=tx.objectStore(store).index(indexName).getAll(value); rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>rej(rq.error); }); }

const Settings = {
  get(){
    try{ return JSON.parse(localStorage.getItem('canon_settings')||'{}'); }catch(e){ return {}; }

    const cur = Settings.get();

  }
};

function fwPrimary(cat, item){ return item.fields[FW_FIELDS[cat][0][0]] || 'Untitled'; }
function fwSecondary(cat, item){
  const f = item.fields;
  if(cat==='characters') return [f.faction, f.tier].filter(Boolean).join(' · ');
  if(cat==='factions') return f.leader || '';
  if(cat==='threads') return [f.type, f.status].filter(Boolean).join(' · ');
  if(cat==='geography') return f.type || '';
  if(cat==='powersystem') return '';
  return '';
}

async function createChapter(){
  const chapters = S.chaptersCache;
  const ch = { id: uid(), novelId: S.novelId, title:'', content:'', status:'draft',
    order: chapters.length, createdAt: Date.now(), updatedAt: Date.now() };
  await dbPut('chapters', ch);
  await touchNovelCount();
  S.chapterId = ch.id;
  S.route = 'write';
  await render();
}
async function moveChapter(id, dir){
  const chapters = S.chaptersCache.slice();
  const idx = chapters.findIndex(c=>c.id===id);
  const swapIdx = dir==='up' ? idx-1 : idx+1;
  if(swapIdx<0 || swapIdx>=chapters.length) return;
  const a = chapters[idx], b = chapters[swapIdx];
  const tmp = a.order; a.order = b.order; b.order = tmp;
  await dbPut('chapters', a); await dbPut('chapters', b);
  await render();
}
async function touchNovelCount(){
  const novel = await dbGet('novels', S.novelId);
  const chapters = await dbGetByIndex('chapters','novelId',S.novelId);
  novel.chapterCount = chapters.length;
  novel.totalWords = chapters.reduce((sum,c) => sum + wordCount(c.content), 0);
  novel.updatedAt = Date.now();
  await dbPut('novels', novel);
}

/* ============================================================
   PDF TEXT EXTRACTION (pdf.js)
   ============================================================ */
async function extractPdfText(file){
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: buf}).promise;
  let text = '';
  for(let i=1; i<=pdf.numPages; i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(' ') + '\n\n';
  }
  return text;
}

/* ============================================================
   GEMINI
   Model names change often (Google deprecates/renames on its own
   schedule) so instead of hardcoding one, we ask the API what's
   actually available to this key, rank the candidates, and try
   them in order until one works. The winner is cached so normal
   use only makes one call.
   ============================================================ */
async function listGeminiModels(apiKey){
  const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${encodeURIComponent(apiKey)}`;
  const res = await fetch(url);
  if(!res.ok){
    const t = await res.text().catch(()=>'');
    throw new Error(`Could not list Gemini models (${res.status}): ${t.slice(0,150)}`);
  }
  const data = await res.json();
  return data.models || [];
}
function rankModelCandidates(models){
  const usable = models.filter(m => (m.supportedGenerationMethods||[]).includes('generateContent'));
  const names = [...new Set(usable.map(m => m.name.replace(/^models\//,'')))];
  const score = (n) => {
    let s = 0;
    if(/flash/i.test(n)) s += 10;
    if(/pro/i.test(n)) s -= 4;
    if(/lite/i.test(n)) s += 1;
    if(/embedding|aqa|tts|imagen|image-generation|vision-only|live|robotics|computer-use|veo|lyria/i.test(n)) s -= 30;
    if(/preview/i.test(n)) s -= 1;
    if(/^gemini-\d/.test(n)) s += 2;
    return s;
  };
  return names.sort((a,b) => score(b) - score(a));
}
async function attemptGeminiCall(apiKey, model, promptText, wantJson){
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(apiKey)}`;
  const body = { contents: [{ parts: [{ text: promptText }] }] };
  if(wantJson) body.generationConfig = { responseMimeType: 'application/json' };
  const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  if(!res.ok){
    const t = await res.text().catch(()=>'');
    const err = new Error(`Gemini ${res.status}: ${t.slice(0,180)}`);
    err.status = res.status;
    throw err;
  }
  const data = await res.json();
  const text = ((data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts) || [])
    .map(p => p.text || '').join('');
  return text;
}
async function resolveAndCallGemini(apiKey, promptText, wantJson){
  const s = Settings.get();
  const tried = new Set();
  const orderedFirstPicks = [s.geminiPreferredModel, s.geminiWorkingModel].filter(Boolean);

  for(const model of orderedFirstPicks){
    if(tried.has(model)) continue;
    tried.add(model);
    try{
      const text = await attemptGeminiCall(apiKey, model, promptText, wantJson);
      Settings.set({ geminiWorkingModel: model });
      return { model, text };
    }catch(e){ /* fall through to discovery */ }
  }

  let candidates;
  try{
    const models = await listGeminiModels(apiKey);
    candidates = rankModelCandidates(models);
  }catch(e){
    throw new Error('Could not reach Gemini — check your API key. (' + e.message + ')');
  }
  if(candidates.length === 0) throw new Error('This Gemini API key has no models available for text generation.');

  let lastErr;
  for(const model of candidates){
    if(tried.has(model)) continue;
    tried.add(model);
    try{
      const text = await attemptGeminiCall(apiKey, model, promptText, wantJson);
      Settings.set({ geminiWorkingModel: model });
      return { model, text };
    }catch(e){ lastErr = e; continue; }
  }
  throw new Error('No available Gemini model worked for this key. Last error: ' + (lastErr ? lastErr.message : 'unknown'));
}
async function callGemini(promptText, wantJson){
  const s = Settings.get();
  if(!s.geminiKey) throw new Error('No Gemini API key set. Add one in Settings.');
  const { text } = await resolveAndCallGemini(s.geminiKey, promptText, wantJson);
  if(!text) throw new Error('Gemini returned an empty response.');
  return text;
}
function stripJsonFence(t){ return t.replace(/```json/gi,'').replace(/```/g,'').trim(); }

async function geminiParseFramework(rawText){
  const prompt = `You are sorting a novel's story-bible document into structured JSON. Read the text below and extract everything it establishes about the story world.

Return ONLY valid JSON, no commentary, matching exactly this shape:
{
  "characters": [{"name":"","faction":"","inheritance":"","tier":"","status":"","relationships":""}],
  "factions": [{"name":"","leader":"","members":"","goal":"","territory":"","relations":""}],
  "threads": [{"title":"","type":"Mystery","status":"Active","introduced":"","affected":"","lastReferenced":"","clues":"","questions":"","resolution":""}],
  "geography": [{"name":"","type":"","notes":""}],
  "powersystem": [{"tier":"","description":""}],
  "worldnotes": [{"title":"","content":""}]
}

Only include an entry if the source text actually supports it. Leave a field as an empty string if unknown — never invent facts not present in the text. Keep each field concise (1-2 sentences max). For "threads", set "type" to one of: Mystery, Subplot, Dangling Thread — and "status" to one of: Active, Dormant, Resolved.

SOURCE TEXT:
${rawText.slice(0, 60000)}`;
  const out = await callGemini(prompt, true);
  try{ return JSON.parse(stripJsonFence(out)); }
  catch(e){ throw new Error('Could not parse Gemini\'s response as JSON.'); }
}

function compactFrameworkContext(items){
  const byCat = {};
  items.forEach(i => { (byCat[i.category] = byCat[i.category]||[]).push(i); });
  let out = '';
  for(const cat of Object.keys(byCat)){
    const label = (FW_CATS.find(c=>c.key===cat)||{}).label || cat;
    out += `\n## ${label}\n`;
    byCat[cat].forEach(item=>{
      const vals = FW_FIELDS[cat].map(([k,l])=> item.fields[k] ? `${l}: ${item.fields[k]}` : null).filter(Boolean).join(' | ');
      out += `- ${vals}\n`;
    });
  }
  return out || '(no framework entries yet)';
}

/* ============================================================
   ASSISTANT TAB
   ============================================================ */
async function initAssistantTab(){
  const wrap = document.getElementById('tabBody');
  S.chatCache = (await dbGetByIndex('chatlogs','novelId',S.novelId)).sort((a,b)=>a.timestamp-b.timestamp);
  wrap.innerHTML = `
    <div class="assist-actions">
      <button class="chip" id="chipCheckChapter">${icon('search',14)} Check a chapter against canon</button>
    </div>
    <div class="chat-scroll" id="chatScroll">
      ${S.chatCache.map(m=>chatBubble(m)).join('')}
    </div>
    <div class="chat-input-row">
      <textarea id="chatInput" rows="1" placeholder="Ask the assistant..."></textarea>
      <button class="chat-send" id="chatSend">${icon('send',18)}</button>
    </div>
  `;
  const scroll = document.getElementById('chatScroll');
  scroll.scrollTop = scroll.scrollHeight;

  document.getElementById('chipCheckChapter').onclick = openChapterPicker;
  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('chatSend');
  const send = async () => {
    const text = input.value.trim();
    if(!text) return;
    input.value=''; input.style.height='auto';
    await pushChatMsg('user', text);
    sendBtn.disabled = true;
    const thinkingId = pushThinking();
    try{
      const context = compactFrameworkContext(S.frameworkCache);
      const prompt = `You are the writing assistant inside "Canon," an app that helps an author keep their novel's canon straight. Answer conversationally and concisely. Use the story bible context below to inform your answer; if something isn't established, say so rather than inventing it.\n\nSTORY BIBLE:\n${context}\n\nAUTHOR'S MESSAGE:\n${text}`;
      const reply = await callGemini(prompt, false);
      removeThinking(thinkingId);
      await pushChatMsg('ai', reply);
    }catch(err){
      removeThinking(thinkingId);
      await pushChatMsg('system', 'Error: ' + err.message);
    }
    sendBtn.disabled = false;
  };
  sendBtn.onclick = send;
  input.onkeydown = (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } };
  input.oninput = () => { input.style.height='auto'; input.style.height = Math.min(input.scrollHeight,100)+'px'; };
}

function chatBubble(m){
  if(m.role==='system') return `<div class="msg system">${esc(m.content)}</div>`;
  return `<div class="msg ${m.role==='user'?'user':'ai'}">${esc(m.content).replace(/\n/g,'<br>')}</div>`;
}
async function pushChatMsg(role, content){
  const msg = { id: uid(), novelId: S.novelId, role, content, timestamp: Date.now() };
  await dbPut('chatlogs', msg);
  S.chatCache.push(msg);
  const scroll = document.getElementById('chatScroll');
  if(scroll){
    scroll.insertAdjacentHTML('beforeend', chatBubble(msg));
    scroll.scrollTop = scroll.scrollHeight;
  }
}
function pushThinking(){
  const scroll = document.getElementById('chatScroll');
  const id = 'think-' + uid();
  if(scroll) scroll.insertAdjacentHTML('beforeend', `<div class="msg ai" id="${id}"><span class="spinner dark"></span></div>`);
  if(scroll) scroll.scrollTop = scroll.scrollHeight;
  return id;
}
function removeThinking(id){ const el = document.getElementById(id); if(el) el.remove(); }

/* ---------- chapter picker + continuity check (signature feature) ---------- */
function openChapterPicker(){
  const backdrop = document.getElementById('sheetBackdrop');
  const content = document.getElementById('sheetContent');
  const chapters = S.chaptersCache;
  content.innerHTML = `
    <div class="sheet-handle"></div>
    <h2>Check a chapter</h2>
    ${chapters.length===0 ? `<p style="color:var(--text-muted);font-size:13px;">No chapters yet.</p>` :
      chapters.map(c=>`<div class="card" data-pick="${c.id}" style="cursor:pointer;"><div class="card-title">${esc(c.title||'Untitled chapter')}</div><div class="card-sub">${wordCount(c.content)} words</div></div>`).join('')}
  `;
  backdrop.classList.add('active');
  content.querySelectorAll('[data-pick]').forEach(el=>{
    el.onclick = () => { closeSheet(); runContinuityCheck(el.dataset.pick); };
  });
}

async function runContinuityCheck(chapterId){
  const chapter = await dbGet('chapters', chapterId);
  const wrap = document.getElementById('chatScroll');
  await pushChatMsg('system', `Checking "${chapter.title||'Untitled chapter'}" against your story bible…`);
  const thinkingId = pushThinking();
  try{
    const context = compactFrameworkContext(S.frameworkCache);
    const prompt = `You are a continuity checker for a novel. Compare the CHAPTER TEXT against the STORY BIBLE. Return ONLY valid JSON, no commentary, in this shape:
{
  "newEntities": [{"type":"character|faction|location|mystery","name":"","detail":""}],
  "conflicts": [{"fact":"","chapterSays":"","bibleSays":""}],
  "questions": [{"question":""}],
  "threadUpdates": [{"threadTitle":"","clue":""}]
}
Only flag a conflict if the chapter text clearly contradicts something explicitly stated in the story bible — do not flag stylistic choices or omissions. Only list a newEntity if it is a named character, faction, place, or unresolved mystery that does not already appear in the story bible. For threadUpdates: the STORY BIBLE contains a "Threads" section listing tracked mysteries, subplots, and dangling threads by Title — if the chapter text contains a new clue, event, or reference connected to one of those exact existing Titles, report it here using the Title exactly as written in the bible so it can be matched; do not invent a threadTitle that isn't already in the bible's Threads section. Keep it minimal — empty arrays are fine if there's nothing to flag.

STORY BIBLE:
${context}

CHAPTER TEXT:
${(chapter.content||'').slice(0, 40000)}`;
    const out = await callGemini(prompt, true);
    const result = JSON.parse(stripJsonFence(out));
    result.staleThreads = computeStaleThreads(chapter.order);
    removeThinking(thinkingId);
    renderContinuityResults(result, chapter);
  }catch(err){
    removeThinking(thinkingId);
    await pushChatMsg('system', 'Continuity check failed: ' + err.message);
  }
}

async function addThreadClue(threadTitle, clueText, chapterTitle, chapterOrder){
  const match = S.frameworkCache.find(i => i.category==='threads' && (i.fields.title||'').trim().toLowerCase() === String(threadTitle).trim().toLowerCase());
  if(!match) return false;
  const noteLine = clueText + (chapterTitle ? ` (${chapterTitle})` : '');
  match.fields.clues = match.fields.clues ? match.fields.clues + '\n' + noteLine : noteLine;
  if(typeof chapterOrder === 'number') match.fields._lastRefOrder = chapterOrder;
  match.updatedAt = Date.now();
  await dbPut('framework', match);
  S.frameworkCache = await dbGetByIndex('framework','novelId',S.novelId);
  return true;
}

/* Pure local computation — doesn't rely on Gemini to count chapters,
   just compares each active thread's last-tracked chapter position
   against the chapter currently being checked. */
function computeStaleThreads(currentOrder){
  const threshold = Number(Settings.get().staleThreshold) || 15;
  return S.frameworkCache
    .filter(i => i.category === 'threads')
    .filter(i => (i.fields.status || '').toLowerCase() === 'active')
    .filter(i => typeof i.fields._lastRefOrder === 'number')
    .map(i => ({ title: i.fields.title || 'Untitled', gap: currentOrder - i.fields._lastRefOrder }))
    .filter(x => x.gap >= threshold)
    .sort((a,b) => b.gap - a.gap);
}

function renderContinuityResults(result, chapter){
  const scroll = document.getElementById('chatScroll');
  const newE = result.newEntities || [];
  const conflicts = result.conflicts || [];
  const questions = result.questions || [];
  const threadUpdates = result.threadUpdates || [];
  const staleThreads = result.staleThreads || [];
  if(newE.length===0 && conflicts.length===0 && questions.length===0 && threadUpdates.length===0 && staleThreads.length===0){
    pushChatMsg('system', 'No new entities, conflicts, or thread updates found. This chapter is clean against your bible.');
    return;
  }
  let html = '';
  staleThreads.forEach((s)=>{
    html += `
    <div class="cc-result stale">
      <div class="cc-tag">${icon('clock',14)} Stale thread — ${esc(s.title)}</div>
      <div class="cc-body">
        <div class="cc-line" style="font-size:13px;">Not referenced in ${s.gap} chapters.</div>
      </div>
    </div>`;
  });
  conflicts.forEach((c,i)=>{
    html += `
    <div class="cc-result conflict">
      <div class="cc-tag">${icon('alertTri',14)} Conflict — ${esc(c.fact||'')}</div>
      <div class="cc-body">
        <div class="cc-compare">
          <div class="cc-line"><span class="cc-src">Bible</span><span>${esc(c.bibleSays||'')}</span></div>
          <div class="cc-line"><span class="cc-src">Chapter</span><span>${esc(c.chapterSays||'')}</span></div>
        </div>
      </div>
    </div>`;
  });
  threadUpdates.forEach((t)=>{
    html += `
    <div class="cc-result thread">
      <div class="cc-tag">${icon('link',14)} Thread update — ${esc(t.threadTitle||'')}</div>
      <div class="cc-body">
        <div class="cc-line" style="font-size:13px;">${esc(t.clue||'')}</div>
        <div class="cc-actions">
          <button class="btn primary small" data-add-thread='${esc(JSON.stringify(t))}'>${icon('link',14)} Add clue to thread</button>
        </div>
      </div>
    </div>`;
  });
  newE.forEach((n,i)=>{
    html += `
    <div class="cc-result new">
      <div class="cc-tag">${icon('sparkles',14)} New ${esc(n.type||'entity')} — ${esc(n.name||'')}</div>
      <div class="cc-body">
        <div class="cc-line" style="font-size:13px;">${esc(n.detail||'')}</div>
        <div class="cc-actions">
          <button class="btn primary small" data-add-entity='${esc(JSON.stringify(n))}'>${icon('plus',14)} Add to framework</button>
        </div>
      </div>
    </div>`;
  });
  questions.forEach(q=>{
    html += `
    <div class="cc-result question">
      <div class="cc-tag">${icon('help',14)} Worth clarifying</div>
      <div class="cc-body"><div class="cc-line" style="font-size:13px;">${esc(q.question||'')}</div></div>
    </div>`;
  });
  scroll.insertAdjacentHTML('beforeend', `<div class="msg ai" style="max-width:100%;width:100%;background:none;padding:0;">${html}</div>`);
  scroll.scrollTop = scroll.scrollHeight;
  scroll.querySelectorAll('[data-add-entity]').forEach(btn=>{
    btn.onclick = async () => {
      const n = JSON.parse(btn.dataset.addEntity);
      const catMap = {character:'characters', faction:'factions', location:'geography', mystery:'threads'};
      const cat = catMap[n.type] || 'worldnotes';
      let fields;
      if(cat === 'threads'){
        fields = { title: n.name || 'Untitled', type: 'Mystery', status: 'Active', questions: n.detail || '' };
        if(chapter && typeof chapter.order === 'number') fields._lastRefOrder = chapter.order;
      } else {
        fields = {};
        const firstKey = FW_FIELDS[cat][0][0];
        fields[firstKey] = n.name || 'Untitled';
        const secondKey = FW_FIELDS[cat][1] ? FW_FIELDS[cat][1][0] : null;
        if(secondKey) fields[secondKey] = n.detail || '';
      }
      await dbPut('framework', { id: uid(), novelId: S.novelId, category: cat, fields, createdAt: Date.now(), updatedAt: Date.now() });
      S.frameworkCache = await dbGetByIndex('framework','novelId',S.novelId);
      btn.textContent = 'Added ✓';
      btn.disabled = true;
    };
  });
  scroll.querySelectorAll('[data-add-thread]').forEach(btn=>{
    btn.onclick = async () => {
      const t = JSON.parse(btn.dataset.addThread);
      const ok = await addThreadClue(t.threadTitle, t.clue, chapter && chapter.title, chapter && chapter.order);
      if(ok){ btn.textContent = 'Added ✓'; btn.disabled = true; }
      else { btn.textContent = 'Thread not found — add manually'; btn.disabled = true; }
    };
  });
}

async function migrateMysteriesToThreads(){
  const all = await dbGetAll('framework');
  const legacy = all.filter(i => i.category === 'mysteries');
  for(const item of legacy){
    const old = item.fields || {};
    item.category = 'threads';
    item.fields = {
      title: old.title || '',
      type: 'Mystery',
      status: old.status || 'Active',
      introduced: '',
      affected: '',
      lastReferenced: '',
      clues: '',
      questions: old.description || '',
      resolution: ''
    };
    item.updatedAt = Date.now();
    await dbPut('framework', item);
  }
}

  if(s.theme){

  await openDB();
  await migrateMysteriesToThreads();
