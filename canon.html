async function runFileImportFlow(file, statusEl){
  const s = Settings.get();
  if(!s.geminiKey){ toast('Add your Gemini API key in Settings first'); if(statusEl) statusEl.textContent = ''; return false; }
  const setStatus = (msg) => { if(statusEl) statusEl.textContent = msg; else toast(msg); };
  try{
    setStatus('Reading file…');
    const text = await extractFileText(file);
    setStatus('Asking Gemini to sort it…');
    const novel = await dbGet('novels', S.novelId);
    const { data: result, incomplete } = await geminiParseFramework(text, novel);

    // build a lookup of what's already there, per category, so re-imports don't duplicate
    const existing = await dbGetByIndex('framework', 'novelId', S.novelId);
    const existingKeys = {};
    for(const item of existing){
      const primaryKey = FW_FIELDS[item.category] ? FW_FIELDS[item.category][0][0] : null;
      if(!primaryKey) continue;
      const val = (item.fields[primaryKey] || '').trim().toLowerCase();
      if(!val) continue;
      (existingKeys[item.category] = existingKeys[item.category] || new Set()).add(val);
    }

    let count = 0, skipped = 0;
    const catsInPlay = visibleCatKeys(novel);
    for(const cat of Object.keys(result)){
      if(!FW_FIELDS[cat] || !catsInPlay.includes(cat)) continue;
      const primaryKey = FW_FIELDS[cat][0][0];
      for(const entry of (result[cat]||[])){
        const val = (entry[primaryKey] || '').trim().toLowerCase();
        if(val && existingKeys[cat] && existingKeys[cat].has(val)){
          skipped++;
          continue;
        }
        await dbPut('framework', { id: uid(), novelId: S.novelId, category: cat, fields: entry, createdAt: Date.now(), updatedAt: Date.now() });
        if(val) (existingKeys[cat] = existingKeys[cat] || new Set()).add(val);
        count++;
      }
    }
    let summary = skipped > 0
      ? `Imported ${count} entries (skipped ${skipped} already in your bible).`
      : `Imported ${count} entries.`;
    if(incomplete) summary += ' Gemini\'s response was cut short — run the import again to catch anything missed.';
    setStatus(summary);
    toast(summary);
    checkMilestones();
    setTimeout(()=>{ closeSheet(); S.workspaceTab='framework'; render(); }, 900);
    return true;
  }catch(err){
    console.error(err);
    setStatus('Import failed: ' + err.message);
    return false;
  }
}

async function checkForSharedPdf(){
  const params = new URLSearchParams(location.search);
  if(params.get('shared') !== 'file') return;
  history.replaceState(history.state, '', location.pathname); // clean URL so a refresh doesn't re-trigger
  try{
    const cache = await caches.open('canon-share-cache');
    const resp = await cache.match('/shared-file');
    if(!resp){ toast('No shared file found — try sharing again.'); return; }
    const blob = await resp.blob();
    const name = resp.headers.get('X-Shared-Filename') || 'shared-file';
    await cache.delete('/shared-file');
    S._pendingSharedFile = new File([blob], name, { type: blob.type });
    S.novelsCache = await dbGetAll('novels');
    openSheet('sharedPdfPicker');
  }catch(e){
    console.warn('Shared file retrieval failed:', e.message);
  }
}


/* ============================================================
   PDF TEXT EXTRACTION (pdf.js)
   ============================================================ */
async function extractPdfText(file){
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: buf}).promise;
  let text = '';
  for(let i=1; i<=pdf.numPages; i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(' ') + '\n\n';
  }
  return text;
}

/* ============================================================
   GENERIC FILE TEXT EXTRACTION
   Dispatches by extension/mime so the same import flow (PDF import
   sheet + share-target) can accept PDF, Word docs, and Markdown/
   plain text. Docx is unzipped + converted client-side via
   mammoth.js; markdown/plain text needs no conversion at all.
   ============================================================ */
const DOCX_MIME = 'application/vnd.openxmlformats-officedocument.wordprocessingml.document';
function importableFileKind(file){
  const name = (file.name || '').toLowerCase();
  if(name.endsWith('.pdf') || file.type === 'application/pdf') return 'pdf';
  if(name.endsWith('.docx') || file.type === DOCX_MIME) return 'docx';
  if(name.endsWith('.md') || name.endsWith('.markdown') || name.endsWith('.txt') || (file.type||'').startsWith('text/')) return 'text';
  return null;
}
async function extractFileText(file){
  const kind = importableFileKind(file);
  if(kind === 'pdf') return await extractPdfText(file);
  if(kind === 'docx'){
    if(!window.mammoth) throw new Error('Docx reader failed to load — check your connection and try again.');
    const buf = await file.arrayBuffer();
    const result = await mammoth.extractRawText({ arrayBuffer: buf });
    return result.value || '';
  }
  if(kind === 'text') return await file.text();
  throw new Error('Unsupported file type — use a PDF, Word (.docx), Markdown, or plain text file.');
}

/* ============================================================
   GEMINI
   Model names change often (Google deprecates/renames on its own
   schedule) so instead of hardcoding one, we ask the API what's
   actually available to this key, rank the candidates, and try
   them in order until one works. The winner is cached so normal
   use only makes one call.
   ============================================================ */
async function listGeminiModels(apiKey){
  const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${encodeURIComponent(apiKey)}`;
  const res = await fetch(url);
  if(!res.ok){
    const t = await res.text().catch(()=>'');
    throw new Error(`Could not list Gemini models (${res.status}): ${t.slice(0,150)}`);
  }
  const data = await res.json();
  return data.models || [];
}
function rankModelCandidates(models){
  const usable = models.filter(m => (m.supportedGenerationMethods||[]).includes('generateContent'));
  const names = [...new Set(usable.map(m => m.name.replace(/^models\//,'')))];
  const score = (n) => {
    let s = 0;
    if(/flash/i.test(n)) s += 10;
    if(/pro/i.test(n)) s -= 4;
    if(/lite/i.test(n)) s += 1;
    if(/embedding|aqa|tts|imagen|image-generation|vision-only|live|robotics|computer-use|veo|lyria/i.test(n)) s -= 30;
    if(/preview/i.test(n)) s -= 1;
    if(/^gemini-\d/.test(n)) s += 2;
    return s;
  };
  return names.sort((a,b) => score(b) - score(a));
}
async function attemptGeminiCall(apiKey, model, bodyExtra, wantJson){
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(apiKey)}`;
  const body = Object.assign({}, bodyExtra);
  if(wantJson) body.generationConfig = { responseMimeType: 'application/json', maxOutputTokens: 16384 };
  else if(!body.generationConfig) body.generationConfig = { maxOutputTokens: 8192 };
  const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  if(!res.ok){
    const t = await res.text().catch(()=>'');
    const err = new Error(`Gemini ${res.status}: ${t.slice(0,180)}`);
    err.status = res.status;
    throw err;
  }
  const data = await res.json();
  const candidate = (data.candidates && data.candidates[0]) || {};
  const parts = (candidate.content && candidate.content.parts) || [];
  const text = parts.filter(p => p.text && !p.thought).map(p => p.text).join('');
  const functionCalls = parts.filter(p => p.functionCall).map(p => p.functionCall);
  const truncated = candidate.finishReason === 'MAX_TOKENS';
  return { text, truncated, functionCalls };
}
async function resolveAndCallGemini(apiKey, bodyExtra, wantJson){
  const s = Settings.get();
  const tried = new Set();
  const orderedFirstPicks = [s.geminiPreferredModel, s.geminiWorkingModel].filter(Boolean);

  for(const model of orderedFirstPicks){
    if(tried.has(model)) continue;
    tried.add(model);
    try{
      const result = await attemptGeminiCall(apiKey, model, bodyExtra, wantJson);
      Settings.set({ geminiWorkingModel: model });
      return Object.assign({ model }, result);
    }catch(e){ /* fall through to discovery */ }
  }

  let candidates;
  try{
    const models = await listGeminiModels(apiKey);
    candidates = rankModelCandidates(models);
  }catch(e){
    throw new Error('Could not reach Gemini — check your API key. (' + e.message + ')');
  }
  if(candidates.length === 0) throw new Error('This Gemini API key has no models available for text generation.');

  let lastErr;
  for(const model of candidates){
    if(tried.has(model)) continue;
    tried.add(model);
    try{
      const result = await attemptGeminiCall(apiKey, model, bodyExtra, wantJson);
      Settings.set({ geminiWorkingModel: model });
      return Object.assign({ model }, result);
    }catch(e){ lastErr = e; continue; }
  }
  throw new Error('No available Gemini model worked for this key. Last error: ' + (lastErr ? lastErr.message : 'unknown'));
}
async function callGemini(promptText, wantJson){
  const s = Settings.get();
  if(!s.geminiKey) throw new Error('No Gemini API key set. Add one in Settings.');
  const { text, truncated } = await resolveAndCallGemini(s.geminiKey, { contents: [{ parts: [{ text: promptText }] }] }, wantJson);
  if(!text) throw new Error('Gemini returned an empty response.');
  return { text, truncated };
}
function stripJsonFence(t){ return t.replace(/```json/gi,'').replace(/```/g,'').trim(); }

/* ============================================================
   ASSISTANT TOOLS — gives the chat real read/write access to the
   framework instead of just talking about it. Gemini decides when
   to call these; we execute the actual DB operation and report
   back what really happened, so the assistant can't claim to have
   done something it didn't.
   ============================================================ */
const FW_CATS_ENUM = ['characters','factions','threads','geography','powersystem','worldnotes'];
const FRAMEWORK_TOOLS_BASE = [
  { name:'list_framework_entries',
    description:'List every entry in one framework category for the current novel, with their exact current field values. Always call this before update_framework_entry or delete_framework_entry, to get the exact primary-field value to match against — never guess it.',
    parameters:{ type:'OBJECT', properties:{ category:{ type:'STRING', enum:FW_CATS_ENUM } }, required:['category'] } },
  { name:'create_framework_entry',
    description:'Create a new framework entry in the given category. The exact field keys for every category are listed in the FRAMEWORK FIELD SCHEMA in your system instructions — use those keys exactly, and split the information across the matching fields (e.g. a relationship note goes in "relationships", not wherever else it might fit). Never invent a field key or shove unrelated information into a field just because it is the only one you filled in. Call list_framework_entries first only if you need to check for an existing near-duplicate entry.',
    parameters:{ type:'OBJECT', properties:{ category:{ type:'STRING', enum:FW_CATS_ENUM }, fields:{ type:'OBJECT', description:'field key/value pairs for the new entry — keys must match the category\'s real field keys exactly, one piece of information per matching field, per the FRAMEWORK FIELD SCHEMA' } }, required:['category','fields'] } },
  { name:'update_framework_entry',
    description:"Update one or more fields on an existing entry, using the exact field keys from the FRAMEWORK FIELD SCHEMA in your system instructions. matchValue must exactly equal that entry's current primary field value (name for characters/factions, title for threads/worldnotes, name for geography, tier for powersystem) as returned by list_framework_entries — call that first to get the exact value. Only pass the specific field(s) that should change, each routed to its correct key; do not overwrite a field with information that belongs in a different one.",
    parameters:{ type:'OBJECT', properties:{ category:{ type:'STRING', enum:FW_CATS_ENUM }, matchValue:{ type:'STRING' }, fields:{ type:'OBJECT', description:'only the fields that should change, keyed exactly per the FRAMEWORK FIELD SCHEMA' } }, required:['category','matchValue','fields'] } },
  { name:'delete_framework_entry',
    description:'Delete a framework entry by its exact primary field value.',
    parameters:{ type:'OBJECT', properties:{ category:{ type:'STRING', enum:FW_CATS_ENUM }, matchValue:{ type:'STRING' } }, required:['category','matchValue'] } }
];
async function executeFrameworkTool(name, args){
  args = args || {};
  const cat = args.category;
  if(!FW_FIELDS[cat]) return { error: 'Unknown category: ' + cat };
  const novel = await dbGet('novels', S.novelId);
  if(!visibleCatKeys(novel).includes(cat)){
    return { error: `This novel's genre profile ("${novelProfile(novel).label}") doesn't use the "${cat}" category — don't create or look up entries there.` };
  }
  const validKeys = visibleFwFields(novel, cat).map(f => f[0]);
  const primaryKey = validKeys[0];
  const items = (await dbGetByIndex('framework','novelId',S.novelId)).filter(i => i.category === cat);

  if(name === 'list_framework_entries'){
    return { validFieldKeys: validKeys, entries: items.map(i => i.fields) };
  }

  const sanitizeFields = (raw) => {
    const clean = {}, rejected = [];
    for(const k of Object.keys(raw || {})){
      if(validKeys.includes(k)) clean[k] = raw[k];
      else rejected.push(k);
    }
    return { clean, rejected };
  };

  if(name === 'create_framework_entry'){
    const { clean, rejected } = sanitizeFields(args.fields);
    if(Object.keys(clean).length === 0){
      return { error: `None of the given field keys are valid for "${cat}". Valid keys are: ${validKeys.join(', ')}. Retry with correct keys.` };
    }
    const rec = { id: uid(), novelId: S.novelId, category: cat, fields: clean, createdAt: Date.now(), updatedAt: Date.now() };
    await dbPut('framework', rec);
    S.frameworkCache = await dbGetByIndex('framework','novelId',S.novelId);
    checkMilestones();
    const result = { success:true, created: rec.fields };
    if(rejected.length) result.warning = `Ignored unknown field keys: ${rejected.join(', ')}. Valid keys are: ${validKeys.join(', ')}.`;
    return result;
  }
  const match = items.find(i => (i.fields[primaryKey]||'').trim().toLowerCase() === String(args.matchValue||'').trim().toLowerCase());
  if(!match) return { error: `No ${cat} entry found matching "${args.matchValue}". Call list_framework_entries first to get the exact value.` };
  if(name === 'update_framework_entry'){
    const { clean, rejected } = sanitizeFields(args.fields);
    if(Object.keys(clean).length === 0){
      return { error: `None of the given field keys are valid for "${cat}". Valid keys are: ${validKeys.join(', ')}. Retry with correct keys.` };
    }
    Object.assign(match.fields, clean);
    match.updatedAt = Date.now();
    await dbPut('framework', match);
    S.frameworkCache = await dbGetByIndex('framework','novelId',S.novelId);
    const result = { success:true, updated: match.fields };
    if(rejected.length) result.warning = `Ignored unknown field keys: ${rejected.join(', ')}. Valid keys are: ${validKeys.join(', ')}.`;
    return result;
  }
  if(name === 'delete_framework_entry'){
    await dbDelete('framework', match.id);
    S.frameworkCache = await dbGetByIndex('framework','novelId',S.novelId);
    return { success:true, deleted: args.matchValue };
  }
  return { error: 'Unknown tool: ' + name };
}

/* Multi-turn chat with real tool access. `turns` is the recent
   conversation (role: 'user'|'model'), systemText carries the
   persona + story-bible context once rather than repeating it
   every message. Loops while Gemini keeps calling tools, feeding
   the real results back, until it gives a final text answer. */
/* ============================================================
   PLATFORMS — a global (not per-novel) reference list of web-fiction
   platforms, sourced via grounded search rather than hand-curated
   since there are too many to know reliably from memory alone.
   ============================================================ */
const PLATFORM_SEEDS = [

  { name:'Tapas', url:'https://tapas.io', blurb:'Prose and webtoon platform with a strong romance and fantasy readership. Coin-based chapter unlocks.' },
  { name:'ScribbleHub', url:'https://www.scribblehub.com', blurb:'Community-driven site especially popular with progression fantasy, isekai, and LitRPG readers. Free to read.' },
  { name:'Inkitt', url:'https://www.inkitt.com', blurb:'Reader-data-driven platform that can offer publishing deals to well-performing stories. Romance and fantasy heavy.' },
  { name:'GoodNovel', url:'https://www.goodnovel.com', blurb:'Mobile-first platform popular for romance, werewolf, and billionaire fiction. Coin-based chapter unlocks.' },
  { name:'Dreame', url:'https://www.dreame.com', blurb:'Mobile app platform with a strong romance and drama readership. Coin-based unlocks and author contract programs.' }
];
async function ensurePlatformSeeds(){
  const existing = await dbGetAll('platforms');
  if(existing.length > 0) return;
  for(const p of PLATFORM_SEEDS){
    await dbPutRaw('platforms', { id: uid(), name:p.name, url:p.url, blurb:p.blurb, genres:'', source:'seed', createdAt:Date.now() });
  }
}
/* Grounding-only call — deliberately never combined with our custom
   function-calling tools, since that combination isn't reliably
   supported across all Gemini model tiers our auto-discovery might
   pick. Plain text only too, since JSON-mode + grounding together
   is unverified territory. */
async function callGeminiGrounded(parts){
  const s = Settings.get();
  if(!s.geminiKey) throw new Error('No Gemini API key set. Add one in Settings.');
  const bodyExtra = { contents: [{ parts }], tools: [{ google_search: {} }] };
  const { text } = await resolveAndCallGemini(s.geminiKey, bodyExtra, false);
  if(!text) throw new Error('Gemini returned an empty response.');
  return text;
}
async function discoverMorePlatforms(genreHint){
  const existing = await dbGetAll('platforms');
  const existingNames = new Set(existing.map(p => p.name.trim().toLowerCase()));
  const prompt = `Search the web and list real, currently-active web-fiction / novel-publishing platforms${genreHint ? ` that are a good fit for ${genreHint} fiction` : ''}. Do not include any of these already-known platforms: ${[...existingNames].join(', ') || '(none yet)'}.

Return ONLY the list itself — no introduction, no notes about the format, no commentary about your own reasoning or uncertainty, no re-stating these instructions. One platform per line, in EXACTLY this format:
Name | https://url.example.com | one-sentence description of its readership and monetization model

If you are unsure whether a platform is real or still active, leave it out entirely rather than mentioning the uncertainty. List up to 6 platforms.`;
  const out = await callGeminiGrounded([{ text: prompt }]);
  const lines = out.split('\n').map(l => l.trim()).filter(l => l.includes('|'));
  let added = 0;
  for(const line of lines){
    const parts = line.split('|').map(p => p.trim());
    if(parts.length !== 3) continue; // reject anything that isn't exactly Name | URL | Description
    const [name, url, blurb] = parts;
    if(!name || !url || !blurb) continue;
    if(!/^https?:\/\/[^\s]+\.[^\s]+/i.test(url)) continue; // must actually look like a URL
    if(name.length > 60) continue; // a real platform name isn't a full sentence
    if(blurb.length > 220) continue; // a one-sentence description isn't a paragraph of reasoning
    const metaPattern = /[`]|^(wait|note|sorry|i (am|apologize|think|believe|need|should|will|recall|found|couldn't|can't)|the prompt|correction|here (is|are)|based on|as (an|a)|let me|i've|i have|according to|it (seems|appears)|unfortunately|however,? i|to (confirm|clarify))\b/i;
    if(metaPattern.test(name) || metaPattern.test(blurb)) continue; // reject obvious meta-commentary in either field
    if(existingNames.has(name.toLowerCase())) continue;
    await dbPut('platforms', { id: uid(), name, url, blurb, genres: genreHint || '', source:'discovered', createdAt: Date.now() });
    existingNames.add(name.toLowerCase());
    added++;
  }
  return added;
}
/* Per-novel suitability check — reads the bible, first 5 chapters,
   synopsis, and the cover image itself (sent as real image input,
   not just described in text), then gives grounded recommendations
   referencing the platform list already in the app. */
async function suggestPlatformsForNovel(){
  const novel = await dbGet('novels', S.novelId);
  const chapters = (await dbGetByIndex('chapters','novelId',S.novelId)).sort((a,b)=>a.order-b.order).slice(0,5);
  const bible = compactFrameworkContext(S.frameworkCache);
  const platforms = await dbGetAll('platforms');
  const platformList = platforms.map(p => `- ${p.name}: ${p.blurb}`).join('\n');
  const chapterText = chapters.map(c => `### ${c.title||'Untitled'}\n${(c.content||'').slice(0,3000)}`).join('\n\n').slice(0,15000);

  const promptText = `You are helping an author figure out which web-fiction platform(s) would suit their novel best. Search the web if useful to confirm current platform genre focus or policies. Give 2-3 concrete recommendations with brief reasoning, referencing the platforms listed below where relevant (or naming others if a clearly better fit exists outside that list). Keep the whole answer under 200 words.

Reply with ONLY the recommendations themselves — no introduction, no notes about your search process, no commentary about your own reasoning or uncertainty, no re-stating these instructions.

TITLE: ${novel.title}
SYNOPSIS: ${novel.synopsis || '(none written yet)'}

STORY BIBLE:
${bible}

FIRST CHAPTERS:
${chapterText || '(no chapters written yet)'}

KNOWN PLATFORMS IN THIS APP:
${platformList || '(none yet)'}`;

  const parts = [{ text: promptText }];
  if(novel.coverImage && novel.coverImage.indexOf('data:image/') === 0){
    const commaIdx = novel.coverImage.indexOf(',');
    const meta = novel.coverImage.slice(0, commaIdx);
    const b64 = novel.coverImage.slice(commaIdx + 1);
    const mimeMatch = meta.match(/data:(.*);base64/);
    if(mimeMatch) parts.push({ inlineData: { mimeType: mimeMatch[1], data: b64 } });
  }
  return await callGeminiGrounded(parts);
}

async function callGeminiChatWithTools(systemText, turns, novel){
  const s = Settings.get();
  if(!s.geminiKey) throw new Error('No Gemini API key set. Add one in Settings.');
  let contents = turns.map(t => ({ role: t.role, parts: [{ text: t.text }] }));
  const toolLog = [];
  let rounds = 0;
  while(rounds < 5){
    rounds++;
    const bodyExtra = {
      contents,
      systemInstruction: { parts: [{ text: systemText }] },
      tools: [{ functionDeclarations: frameworkTools(novel) }]
    };
    const { text, truncated, functionCalls } = await resolveAndCallGemini(s.geminiKey, bodyExtra, false);
    if(functionCalls && functionCalls.length){
      contents.push({ role:'model', parts: functionCalls.map(fc => ({ functionCall: { name: fc.name, args: fc.args || {} } })) });
      const responseParts = [];
      for(const fc of functionCalls){
        const result = await executeFrameworkTool(fc.name, fc.args);
        toolLog.push({ name: fc.name, args: fc.args, result });
        responseParts.push({ functionResponse: { name: fc.name, response: result } });
      }
      contents.push({ role:'function', parts: responseParts });
      continue;
    }
    if(!text) throw new Error('Gemini returned an empty response.');
    return { text, truncated, toolLog };
  }
  throw new Error('That took too many steps — try a simpler request.');
}

/* Gemini's JSON-mode output can still get cut off mid-response for large
   payloads (a full story bible, a long chapter). Rather than just failing,
   try to repair a truncated-but-otherwise-valid JSON string by closing
   whatever braces/brackets/strings were left open. */
function repairTruncatedJson(text){
  let stack = [];
  let inStr = false, esc = false;
  for(let i=0; i<text.length; i++){
    const ch = text[i];
    if(inStr){
      if(esc){ esc = false; }
      else if(ch === '\\'){ esc = true; }
      else if(ch === '"'){ inStr = false; }
      continue;
    }
    if(ch === '"'){ inStr = true; continue; }
    if(ch === '{' || ch === '['){ stack.push(ch); }
    else if(ch === '}' && stack[stack.length-1] === '{'){ stack.pop(); }
    else if(ch === ']' && stack[stack.length-1] === '['){ stack.pop(); }
  }
  if(stack.length === 0 && !inStr) return null; // already balanced — a parse failure here isn't truncation
  let repaired = text;
  if(inStr) repaired += '"';
  repaired = repaired.replace(/,\s*$/, '');
  for(let i=stack.length-1; i>=0; i--){
    repaired += stack[i] === '{' ? '}' : ']';
  }
  return repaired;
}
function parseGeminiJson(rawText){
  const cleaned = stripJsonFence(rawText);
  try{
    return { data: JSON.parse(cleaned), repaired: false };
  }catch(e){
    const repaired = repairTruncatedJson(cleaned);
    if(repaired){
      try{ return { data: JSON.parse(repaired), repaired: true }; }
      catch(e2){ /* fall through */ }
    }
    throw new Error('Could not parse Gemini\'s response as JSON.');
  }
}

function fwJsonShapeFor(novel){
  const obj = {};
  visibleFwCats(novel).forEach(c => {
    const sample = {};
    visibleFwFields(novel, c.key).forEach(f => { sample[f[0]] = f[2] ? f[2][0] : ''; });
    obj[c.key] = [sample];
  });
  return JSON.stringify(obj, null, 2);
}
async function geminiParseFramework(rawText, novel){
  const catsInPlay = visibleCatKeys(novel);
  const prompt = `You are sorting a novel's story-bible document into structured JSON. Read the text below and extract everything it establishes about the story world.

This novel's genre profile is "${novelProfile(novel).label}" — only extract into the categories below; there is no page for anything else, so don't invent extra top-level keys.

Return ONLY valid JSON, no commentary, matching exactly this shape:
${fwJsonShapeFor(novel)}

Only include an entry if the source text actually supports it. Leave a field as an empty string if unknown — never invent facts not present in the text. Preserve full detail in every field — do NOT summarize or condense; copy the actual specifics (names, numbers, exact descriptions) from the source rather than compressing them into a shorter paraphrase. It's fine if this response can't cover the entire document in one pass — the author will re-run this import to fill in anything missed, so favor getting fewer entries at full detail over more entries summarized.
${catsInPlay.includes('characters') ? `\nUse "notes" on characters/factions for anything real and important that doesn't fit any other field, so genre-specific details are never lost just because there's no dedicated field for them.\n` : ''}
${catsInPlay.includes('powersystem') ? `\nFor "powersystem" specifically: create ONE SEPARATE ENTRY PER DISTINCT LEVEL, STAGE, OR MILESTONE described (e.g. if a tier has four named sub-stages, that's four separate entries, not one summary of the tier) — put both the tier and the stage/milestone name in "tier" (e.g. "Lord — Aura Dawn") and the full specific detail for that one stage in "description". Never collapse multiple stages into a single averaged-out entry.\n` : ''}
${catsInPlay.includes('threads') ? `\nFor "threads", set "type" to one of: Mystery, Subplot, Dangling Thread — and "status" to one of: Active, Dormant, Resolved.\n` : ''}
SOURCE TEXT:
${rawText.slice(0, 60000)}`;
  const { text: out, truncated } = await callGemini(prompt, true);
  const { data, repaired } = parseGeminiJson(out);
  return { data, incomplete: truncated || repaired };
}

function compactFrameworkContext(items){
  const byCat = {};
  items.forEach(i => { (byCat[i.category] = byCat[i.category]||[]).push(i); });
  let out = '';
  for(const cat of Object.keys(byCat)){
    const label = (FW_CATS.find(c=>c.key===cat)||{}).label || cat;
    out += `\n## ${label}\n`;
    byCat[cat].forEach(item=>{
      const vals = FW_FIELDS[cat].map(([k,l])=> item.fields[k] ? `${l}: ${item.fields[k]}` : null).filter(Boolean).join(' | ');
      out += `- ${vals}\n`;
    });
  }
  return out || '(no framework entries yet)';
}

      const recent = S.chatCache.filter(m => m.role === 'user' || m.role === 'ai').slice(-CHAT_HISTORY_TURNS);

  // Retry regenerates the most recent ai reply: drop everything from
  // (and including) that reply back to just after the user message
  // that prompted it, then re-run the same turn.
  const retryLastReply = async () => {
    const lastAiIdx = S.chatCache.map(m => m.role).lastIndexOf('ai');
    if(lastAiIdx === -1) return;
    let cutFrom = lastAiIdx;
    for(let i = lastAiIdx - 1; i >= 0; i--){
      if(S.chatCache[i].role === 'user') break;

    }

        const secondKey = FW_FIELDS[cat][1] ? FW_FIELDS[cat][1][0] : null;
        if(secondKey) fields[secondKey] = n.detail || '';
      }
      await dbPut('framework', { id: uid(), novelId: S.novelId, category: cat, fields, createdAt: Date.now(), updatedAt: Date.now() });
      S.frameworkCache = await dbGetByIndex('framework','novelId',S.novelId);
      addEntityBtn.textContent = 'Added ✓';
      addEntityBtn.disabled = true;
      return;
    }
    const addThreadBtn = e.target.closest('[data-add-thread]');
    if(addThreadBtn){
      const t = JSON.parse(addThreadBtn.dataset.addThread);
      const ok = await addThreadClue(t.threadTitle, t.clue, t.chapterTitle, t.chapterOrder);
      if(ok){ addThreadBtn.textContent = 'Added ✓'; addThreadBtn.disabled = true; }
      else { addThreadBtn.textContent = 'Thread not found — add manually'; addThreadBtn.disabled = true; }
      return;
    }
    const btn = e.target.closest('.msg-act');
    if(!btn) return;
    const mid = btn.dataset.mid;
    const act = btn.dataset.act;
    const msg = S.chatCache.find(m => m.id === mid);
    if(!msg) return;
    if(act === 'copy'){
      try{ await navigator.clipboard.writeText(msg.content); toast('Copied'); }
      catch(err){ toast('Could not copy'); }
    }else if(act === 'delete'){
      await dbDelete('chatlogs', mid);

      btn.closest('.msg-wrap')?.remove();
    }else if(act === 'retry'){
      await retryLastReply();

  async function runQuickAction(action){
    if(action.kind === 'chapterCheck'){ openChapterPicker(); return; }

      openChapterPicker(async (chapterId) => {

function summarizeToolCall(t){
  const cat = t.args && t.args.category;
  if(t.name === 'create_framework_entry' && t.result && t.result.success) return `+ added to ${cat}`;
  if(t.name === 'update_framework_entry' && t.result && t.result.success) return `✎ updated ${cat}: ${t.args.matchValue}`;
  if(t.name === 'delete_framework_entry' && t.result && t.result.success) return `− removed from ${cat}: ${t.args.matchValue}`;
  if(t.result && t.result.error) return `⚠ ${t.result.error}`;
  return null;
}

/* ============================================================
   CHAT THREADS
   Each novel can have multiple named conversations. Older data
   (from before this existed) has chatlogs with a novelId but no
   threadId — ensureThreads migrates those into a "Main" thread
   the first time a novel's Assistant tab is opened.
   ============================================================ */
async function ensureThreads(novelId){
  let threads = (await dbGetByIndex('chat_threads','novelId',novelId)).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
  if(threads.length === 0){
    const thread = { id: uid(), novelId, title:'Main', createdAt: Date.now(), updatedAt: Date.now() };
    await dbPut('chat_threads', thread);
    threads = [thread];
  }
  const defaultThread = threads[0];
  const allMsgs = await dbGetByIndex('chatlogs','novelId',novelId);
  const orphans = allMsgs.filter(m => !m.threadId);
  for(const m of orphans){ m.threadId = defaultThread.id; await dbPut('chatlogs', m); }
  return threads;
}
async function createThread(novelId, title){
  const thread = { id: uid(), novelId, title: title || 'New thread', createdAt: Date.now(), updatedAt: Date.now() };
  await dbPut('chat_threads', thread);
  return thread;
}

  S.activeThreadId = threadId;

function msgActionsHtml(m, withRetry){
  return `<div class="msg-actions">
    <button class="msg-act" data-act="copy" data-mid="${m.id}" title="Copy">${icon('copy',13)}</button>
    ${withRetry ? `<button class="msg-act" data-act="retry" data-mid="${m.id}" title="Retry">${icon('refresh',13)}</button>` : ''}
    <button class="msg-act" data-act="delete" data-mid="${m.id}" title="Delete">${icon('trash',13)}</button>
  </div>`;
}
function formatAiText(raw){
  let s = esc(raw);
  s = s.replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/__([^_\n]+?)__/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g, '$1<em>$2</em>');
  s = s.replace(/`([^`\n]+?)`/g, '<code>$1</code>');
  s = s.replace(/^#{1,6}\s+(.+)$/gm, '<strong>$1</strong>');
  s = s.replace(/^[-*]\s+(.+)$/gm, '\u2022 $1');
  s = s.replace(/\n/g, '<br>');
  return s;
}
function chatBubble(m, withRetry){
  if(m.role==='system') return `<div class="msg system" data-mid="${m.id}">${esc(m.content)}</div>`;
  if(m.resultHtml) return `<div class="msg-wrap ai" data-mid="${m.id}"><div class="msg ai" style="max-width:100%;width:100%;background:none;padding:0;">${m.resultHtml}</div>${msgActionsHtml(m, false)}</div>`;
  const escaped = m.role==='ai' ? formatAiText(m.content) : esc(m.content).replace(/\n/g,'<br>');
  const isLong = m.content.length > 320;
  const bubbleClass = m.role==='user' ? 'user' : 'ai';
  const actions = msgActionsHtml(m, withRetry);
  if(!isLong) return `<div class="msg-wrap ${bubbleClass}"><div class="msg ${bubbleClass}">${escaped}</div>${actions}</div>`;
  const cid = 'exp-' + m.id;
  return `<div class="msg-wrap ${bubbleClass}">
    <div class="msg ${bubbleClass}">
      <input type="checkbox" class="msg-expand-toggle" id="${cid}">
      <div class="msg-content-clamped">${escaped}</div>
      <label for="${cid}" class="msg-more-link more">Show more</label>
      <label for="${cid}" class="msg-more-link less">Show less</label>
    </div>
    ${actions}
  </div>`;
}
async function pushChatMsg(role, content){
  const msg = { id: uid(), novelId: S.novelId, threadId: S.activeThreadId, role, content, timestamp: Date.now() };
  await dbPut('chatlogs', msg);
  S.chatCache.push(msg);
  const scroll = document.getElementById('chatScroll');
  if(scroll){
    const empty = scroll.querySelector('.empty-mid');
    if(empty) empty.remove();
    if(role === 'ai'){
      // only the most recent ai reply can be retried — drop the retry
      // control from whatever previously held that spot
      scroll.querySelectorAll('[data-act="retry"]').forEach(b => b.remove());
    }
    scroll.insertAdjacentHTML('beforeend', chatBubble(msg, role === 'ai'));
    scroll.scrollTop = scroll.scrollHeight;
  }
}

function openChapterPicker(onPick, title){
  onPick = onPick || ((id) => runContinuityCheck(id));
  const backdrop = document.getElementById('sheetBackdrop');
  const content = document.getElementById('sheetContent');
  const chapters = S.chaptersCache;
  content.innerHTML = `

  `;
  backdrop.classList.add('active');

  window.addEventListener('popstate', clearIfCancelled, { once:true });
  content.querySelectorAll('[data-pick]').forEach(el=>{
    el.onclick = () => { picked = true; closeSheet(); onPick(el.dataset.pick); };
  });
}

/* Audits the bible against ITSELF — contradictions between two
   entries, not chapter-vs-bible (that's runContinuityCheck above).
   Reuses the same JSON-repair pipeline and conflict-card rendering. */
async function runBibleConsistencyCheck(){
  await pushChatMsg('system', 'Checking your story bible for internal contradictions…');
  setAssistantBusy(true);
  const thinkingId = pushThinking();
  try{
    const context = compactFrameworkContext(S.frameworkCache);
    const prompt = `You are auditing a novel's story bible for INTERNAL contradictions — conflicts between two or more entries in the bible itself (not chapter text). Look across all categories for things like: two characters describing the same relationship inconsistently, a character's tier/status conflicting with what a faction or thread entry implies, faction membership contradictions, or any other factual inconsistency between entries.

Return ONLY valid JSON, no commentary, in this shape:
{
  "conflicts": [{"fact":"","entryA":"","entryASays":"","entryB":"","entryBSays":""}]
}
Only report a conflict if two entries actually contradict each other on a specific, checkable fact — do not report missing information, vague overlap, or stylistic differences. Empty array is fine if nothing contradicts.

STORY BIBLE:
${context}`;
    const { text: out, truncated } = await callGemini(prompt, true);
    const { data: result, repaired } = parseGeminiJson(out);
    result._incomplete = truncated || repaired;
    removeThinking(thinkingId);
    renderBibleConsistencyResults(result);
  }catch(err){
    removeThinking(thinkingId);
    await pushChatMsg('system', 'Consistency check failed: ' + err.message);
  }
  setAssistantBusy(false);
}
function renderBibleConsistencyResults(result){
  const conflicts = result.conflicts || [];
  if(result._incomplete){
    pushChatMsg('system', 'Gemini\'s response was cut short — results below may be incomplete. Try again if something seems missing.');
  }
  if(conflicts.length === 0){
    pushChatMsg('system', 'No internal contradictions found. Your bible is consistent with itself.');
    return;
  }
  const html = conflicts.map(c => `
    <div class="cc-result conflict">
      <div class="cc-tag">${icon('alertTri',14)} Conflict — ${esc(c.fact||'')}</div>
      <div class="cc-body">
        <div class="cc-compare">
          <div class="cc-line"><span class="cc-src">${esc(c.entryA||'Entry A')}</span><span>${esc(c.entryASays||'')}</span></div>
          <div class="cc-line"><span class="cc-src">${esc(c.entryB||'Entry B')}</span><span>${esc(c.entryBSays||'')}</span></div>
        </div>
      </div>
    </div>`).join('');
  pushResultMsg(html, `Bible consistency check: ${conflicts.length} conflict${conflicts.length===1?'':'s'} found.`);
}

async function runContinuityCheck(chapterId){
  const chapter = await dbGet('chapters', chapterId);
  await pushChatMsg('system', `Checking "${chapter.title||'Untitled chapter'}" against your story bible…`);
  setAssistantBusy(true);
  const thinkingId = pushThinking();
  try{
    const context = compactFrameworkContext(S.frameworkCache);
    const prompt = `You are a continuity checker for a novel. Compare the CHAPTER TEXT against the STORY BIBLE. Return ONLY valid JSON, no commentary, in this shape:
{
  "newEntities": [{"type":"character|faction|location|mystery","name":"","detail":""}],
  "conflicts": [{"fact":"","chapterSays":"","bibleSays":""}],
  "questions": [{"question":""}],
  "threadUpdates": [{"threadTitle":"","clue":""}]
}
Only flag a conflict if the chapter text clearly contradicts something explicitly stated in the story bible — do not flag stylistic choices or omissions. Only list a newEntity if it is a named character, faction, place, or unresolved mystery that does not already appear in the story bible. For threadUpdates: the STORY BIBLE contains a "Threads" section listing tracked mysteries, subplots, and dangling threads by Title — if the chapter text contains a new clue, event, or reference connected to one of those exact existing Titles, report it here using the Title exactly as written in the bible so it can be matched; do not invent a threadTitle that isn't already in the bible's Threads section. Keep it minimal — empty arrays are fine if there's nothing to flag.

STORY BIBLE:
${context}

CHAPTER TEXT:
${(chapter.content||'').slice(0, 40000)}`;
    const { text: out, truncated } = await callGemini(prompt, true);
    const { data: result, repaired } = parseGeminiJson(out);
    result.staleThreads = computeStaleThreads(chapter.order);
    result._incomplete = truncated || repaired;
    removeThinking(thinkingId);
    renderContinuityResults(result, chapter);
  }catch(err){
    removeThinking(thinkingId);
    await pushChatMsg('system', 'Continuity check failed: ' + err.message);
  }
  setAssistantBusy(false);
}

async function addThreadClue(threadTitle, clueText, chapterTitle, chapterOrder){
  const match = S.frameworkCache.find(i => i.category==='threads' && (i.fields.title||'').trim().toLowerCase() === String(threadTitle).trim().toLowerCase());
  if(!match) return false;
  const noteLine = clueText + (chapterTitle ? ` (${chapterTitle})` : '');
  match.fields.clues = match.fields.clues ? match.fields.clues + '\n' + noteLine : noteLine;
  if(typeof chapterOrder === 'number') match.fields._lastRefOrder = chapterOrder;
  match.updatedAt = Date.now();
  await dbPut('framework', match);
  S.frameworkCache = await dbGetByIndex('framework','novelId',S.novelId);
  return true;
}

/* Pure local computation — doesn't rely on Gemini to count chapters,
   just compares each active thread's last-tracked chapter position
   against the chapter currently being checked. */
function computeStaleThreads(currentOrder){
  const threshold = Number(Settings.get().staleThreshold) || 15;
  return S.frameworkCache
    .filter(i => i.category === 'threads')
    .filter(i => (i.fields.status || '').toLowerCase() === 'active')
    .filter(i => typeof i.fields._lastRefOrder === 'number')
    .map(i => ({ title: i.fields.title || 'Untitled', gap: currentOrder - i.fields._lastRefOrder }))
    .filter(x => x.gap >= threshold)
    .sort((a,b) => b.gap - a.gap);
}

function renderContinuityResults(result, chapter){
  const newE = result.newEntities || [];
  const conflicts = result.conflicts || [];
  const questions = result.questions || [];
  const threadUpdates = result.threadUpdates || [];
  const staleThreads = result.staleThreads || [];
  if(result._incomplete){
    pushChatMsg('system', 'Gemini\'s response was cut short — results below may be incomplete. Try again if something seems missing.');
  }
  if(newE.length===0 && conflicts.length===0 && questions.length===0 && threadUpdates.length===0 && staleThreads.length===0){
    pushChatMsg('system', 'No new entities, conflicts, or thread updates found. This chapter is clean against your bible.');
    return;
  }
  let html = '';
  staleThreads.forEach((s)=>{
    html += `
    <div class="cc-result stale">
      <div class="cc-tag">${icon('clock',14)} Stale thread — ${esc(s.title)}</div>
      <div class="cc-body">
        <div class="cc-line" style="font-size:13px;">Not referenced in ${s.gap} chapters.</div>
      </div>
    </div>`;
  });
  conflicts.forEach((c,i)=>{
    html += `
    <div class="cc-result conflict">
      <div class="cc-tag">${icon('alertTri',14)} Conflict — ${esc(c.fact||'')}</div>
      <div class="cc-body">
        <div class="cc-compare">
          <div class="cc-line"><span class="cc-src">Bible</span><span>${esc(c.bibleSays||'')}</span></div>
          <div class="cc-line"><span class="cc-src">Chapter</span><span>${esc(c.chapterSays||'')}</span></div>
        </div>
      </div>
    </div>`;
  });
  threadUpdates.forEach((t)=>{
    const payload = { threadTitle: t.threadTitle, clue: t.clue, chapterTitle: chapter && chapter.title, chapterOrder: chapter && chapter.order };
    html += `
    <div class="cc-result thread">
      <div class="cc-tag">${icon('link',14)} Thread update — ${esc(t.threadTitle||'')}</div>
      <div class="cc-body">
        <div class="cc-line" style="font-size:13px;">${esc(t.clue||'')}</div>
        <div class="cc-actions">
          <button class="btn primary small" data-add-thread='${esc(JSON.stringify(payload))}'>${icon('link',14)} Add clue to thread</button>
        </div>
      </div>
    </div>`;
  });
  newE.forEach((n,i)=>{
    const payload = { type: n.type, name: n.name, detail: n.detail, chapterOrder: chapter && chapter.order };
    html += `
    <div class="cc-result new">
      <div class="cc-tag">${icon('sparkles',14)} New ${esc(n.type||'entity')} — ${esc(n.name||'')}</div>
      <div class="cc-body">
        <div class="cc-line" style="font-size:13px;">${esc(n.detail||'')}</div>
        <div class="cc-actions">
          <button class="btn primary small" data-add-entity='${esc(JSON.stringify(payload))}'>${icon('plus',14)} Add to framework</button>
        </div>
      </div>
    </div>`;
  });
  questions.forEach(q=>{
    html += `
    <div class="cc-result question">
      <div class="cc-tag">${icon('help',14)} Worth clarifying</div>
      <div class="cc-body"><div class="cc-line" style="font-size:13px;">${esc(q.question||'')}</div></div>
    </div>`;
  });
  const parts = [];
  if(staleThreads.length) parts.push(`${staleThreads.length} stale thread${staleThreads.length===1?'':'s'}`);
  if(conflicts.length) parts.push(`${conflicts.length} conflict${conflicts.length===1?'':'s'}`);
  if(threadUpdates.length) parts.push(`${threadUpdates.length} thread update${threadUpdates.length===1?'':'s'}`);
  if(newE.length) parts.push(`${newE.length} new ${newE.length===1?'entity':'entities'}`);
  if(questions.length) parts.push(`${questions.length} open question${questions.length===1?'':'s'}`);
  pushResultMsg(html, `Continuity check on "${chapter.title||'Untitled chapter'}": ${parts.join(', ')}.`);
}

async function migrateMysteriesToThreads(){
  const all = await dbGetAll('framework');
  const legacy = all.filter(i => i.category === 'mysteries');
  for(const item of legacy){
    const old = item.fields || {};
    item.category = 'threads';
    item.fields = {
      title: old.title || '',
      type: 'Mystery',
      status: old.status || 'Active',
      introduced: '',
      affected: '',
      lastReferenced: '',
      clues: '',
      questions: old.description || '',
      resolution: ''
    };
    item.updatedAt = Date.now();
    await dbPut('framework', item);
  }
}

/* ============================================================
   CLOUD SYNC (optional, opt-in)
   IndexedDB remains the always-on local store — the app works
   fully offline and with zero setup, same as before. If the user
   pastes a Firebase config and signs in, every local write also
   mirrors to Firestore, and a real-time listener pulls in changes
   from other devices. Conflicts resolve by comparing updatedAt —
   newest copy wins and gets written to both sides.
   ============================================================ */
const SYNC_STORES = ['novels','chapters','framework','chatlogs','chat_threads'];
let _cloudApp = null;
let _cloudListeners = [];
S.cloudUser = null;
S.cloudStatus = 'idle'; // idle | connecting | syncing | synced | partial | error
S.cloudSyncErrors = [];

function cloudConfigured(){
  const cfg = Settings.get().firebaseConfig;
  return !!(cfg && cfg.trim());
}
function cloudReady(){
  return !!(_cloudApp && S.cloudUser);
}
function firestoreColl(store){
  return _cloudApp.firestore().collection('users').doc(S.cloudUser.uid).collection(store);
}

function mirrorPutToCloud(store, obj){
  if(!cloudReady() || !SYNC_STORES.includes(store)) return;
  firestoreColl(store).doc(obj.id).set(obj, { merge:false }).catch(e => console.warn('Cloud sync (put) failed:', e.message));
}
function mirrorDeleteToCloud(store, id){
  if(!cloudReady() || !SYNC_STORES.includes(store)) return;
  firestoreColl(store).doc(id).delete().catch(e => console.warn('Cloud sync (delete) failed:', e.message));
}

function initCloudSync(){
  if(!cloudConfigured()) return;
  try{
    const cfg = JSON.parse(Settings.get().firebaseConfig);
    _cloudApp = firebase.initializeApp(cfg);
    _cloudApp.firestore().enablePersistence({ synchronizeTabs:true }).catch(()=>{ /* fine — e.g. multiple tabs, or unsupported browser */ });
    _cloudApp.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(e => console.warn('Persistence setup failed:', e.message));
    _cloudApp.auth().getRedirectResult().then(async result => {
      const wasPending = sessionStorage.getItem('canon_pending_signin') === '1';
      const wasOnboarding = sessionStorage.getItem('canon_pending_signin_onboarding') === '1';
      sessionStorage.removeItem('canon_pending_signin');
      sessionStorage.removeItem('canon_pending_signin_onboarding');
      if(wasPending && !result.user){
        toast('Sign-in didn\'t complete — your browser may be blocking cross-site data for accounts.google.com. Try allowing third-party cookies for this site and retry.');
      }else if(wasOnboarding && result.user){
        Settings.set({ onboarded:true });
        if(S.route === 'login'){ S.route = 'home'; replaceRouteState(); await render(); }
      }
    }).catch(e => {
      sessionStorage.removeItem('canon_pending_signin');
      sessionStorage.removeItem('canon_pending_signin_onboarding');
      console.warn('Sign-in failed:', e.message);
      toast('Sign-in failed: ' + e.message);
    });
    _cloudApp.auth().onAuthStateChanged(handleAuthChange);
  }catch(e){
    console.warn('Cloud sync init failed:', e.message);
    S.cloudStatus = 'error';
  }
}

async function handleAuthChange(user){
  detachCloudListeners();
  if(!user){
    S.cloudUser = null;
    S.cloudStatus = 'idle';
    S.cloudSyncErrors = [];
    if(S.route === 'settings') render();
    return;
  }
  S.cloudUser = { uid:user.uid, displayName:user.displayName, email:user.email, photoURL:user.photoURL };
  S.cloudStatus = 'syncing';
  if(S.route === 'settings') render();
  try{
    const errors = await reconcileAllStores();
    attachCloudListeners();
    S.cloudStatus = errors.length > 0 ? 'partial' : 'synced';
    S.cloudSyncErrors = errors;
  }catch(e){
    console.warn('Cloud reconcile failed:', e.message);
    S.cloudStatus = 'error';
  }
  if(S.route === 'settings') render();
}

/* One-time pass per sign-in: compare every local vs remote record by
   id, newest updatedAt wins, write the winner to whichever side is stale.
   Each record is isolated — one bad document (e.g. something oversized)
   can't block the rest of the sync. */
async function reconcileAllStores(){
  const errors = [];
  for(const store of SYNC_STORES){
    const [localDocs, remoteSnap] = await Promise.all([
      dbGetAll(store),
      firestoreColl(store).get()
    ]);
    const localById = new Map(localDocs.map(d => [d.id, d]));
    const remoteById = new Map();
    remoteSnap.forEach(doc => remoteById.set(doc.id, doc.data()));

    const allIds = new Set([...localById.keys(), ...remoteById.keys()]);
    for(const id of allIds){
      try{
        const local = localById.get(id);
        const remote = remoteById.get(id);
        if(local && !remote){
          await firestoreColl(store).doc(id).set(local);
        } else if(remote && !local){
          await dbPutRaw(store, remote);
        } else if(local && remote){
          const localNewer = (local.updatedAt||0) >= (remote.updatedAt||0);
          if(localNewer && JSON.stringify(local) !== JSON.stringify(remote)){
            await firestoreColl(store).doc(id).set(local);
          } else if(!localNewer){
            await dbPutRaw(store, remote);
          }
        }
      }catch(e){
        console.warn(`Reconcile failed for ${store}/${id}:`, e.message);
        errors.push({ store, id, message: e.message });
      }
    }
  }
  return errors;
}

function attachCloudListeners(){
  SYNC_STORES.forEach(store => {
    const unsub = firestoreColl(store).onSnapshot(snap => {
      let changed = false;
      snap.docChanges().forEach(change => {
        if(change.doc.metadata.hasPendingWrites) return; // skip echoes of our own just-sent writes
        changed = true;
        if(change.type === 'removed'){
          dbDeleteRaw(store, change.doc.id);
        } else {
          dbPutRaw(store, change.doc.data());
        }
      });
      if(changed && S.route !== 'write') render();
    }, e => console.warn('Cloud listener error:', e.message));
    _cloudListeners.push(unsub);
  });
}
function detachCloudListeners(){
  _cloudListeners.forEach(unsub => { try{ unsub(); }catch(e){} });
  _cloudListeners = [];
}

async function emailPasswordContinue(email, password){
  // One action, no mode toggle: try signing in, and if this email has no
  // account yet, create one with the same credentials instead of making
  // the person declare up front which case they're in.
  //
  // Modern Firebase Auth deliberately collapses "wrong password" and "no
  // such account" into the same auth/invalid-credential error (so a
  // stranger can't probe which emails have accounts). We can't tell those
  // two cases apart from the sign-in error alone, so we attempt account
  // creation next either way — if one already exists, THAT failure
  // (auth/email-already-in-use) is what actually tells us it was a wrong
  // password, and we can say so clearly.
  try{
    await _cloudApp.auth().signInWithEmailAndPassword(email, password);
    return;
  }catch(signInErr){
    if(signInErr.code !== 'auth/user-not-found' && signInErr.code !== 'auth/invalid-credential') throw signInErr;
    try{
      await _cloudApp.auth().createUserWithEmailAndPassword(email, password);
    }catch(createErr){
      if(createErr.code === 'auth/email-already-in-use'){
        throw new Error('That email already has an account — check your password and try again.');
      }
      throw createErr;
    }
  }
}
function signInWithGoogle(){
  if(!_cloudApp){ toast('Save your Firebase config first'); return; }
  const provider = new firebase.auth.GoogleAuthProvider();
  // Popups are unreliable on mobile Chrome and installed PWAs — they're
  // often blocked outright or interrupted, which surfaces as Firebase's
  // "cancelled due to another conflicting popup" error. Redirect is the
  // reliable path on mobile: it navigates to Google and back instead.
  sessionStorage.setItem('canon_pending_signin', '1');
  _cloudApp.auth().signInWithRedirect(provider);
}
function signOutCloud(){
  if(_cloudApp) _cloudApp.auth().signOut();
}
